        // Helper function to parse due_date for storage - fixes the 3:00 AM issue
        function parseDueDate(dateStr) {
            if (!dateStr) return null;
            
            // If date is in YYYY-MM-DDTHH:mm format (from datetime-local input)
            // Extract just the date part YYYY-MM-DD to avoid timezone issues
            if (/^\d{4}-\d{2}-\d{2}T/.test(dateStr)) {
                return dateStr.split('T')[0];
            }
            
            // If already in YYYY-MM-DD format, return as-is
            // This ensures Supabase treats it as a DATE without time component
            if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) {
                return dateStr;
            }
            
            return dateStr;
        }

        // Address search function with intelligent autocomplete
        let searchTimeout = null;
        window.searchAddresses = async function(query) {
            clearTimeout(searchTimeout);
            
            if (!query || query.length < 2) {
                document.getElementById('addressSuggestions').innerHTML = '';
                return;
            }
            
            // Debounce search
            searchTimeout = setTimeout(async () => {
                try {
                    // Search in both tables with only needed columns for display
                    const { data: addresses1, error: error1 } = await supabase
                        .from('atss_q1_2026')
                        .select('id_ploshadki, servisnyy_id, adres_razmeshcheniya, rayon, naimenovanie_sk1')
                        .ilike('adres_razmeshcheniya', `%${query}%`)
                        .limit(5);
                    
                    const { data: addresses2, error: error2 } = await supabase
                        .from('kasip_azm_q1_2026')
                        .select('id_ploshadki, servisnyy_id, adres_raspolozheniya, ploshchadka, naimenovanie_sk1')
                        .ilike('adres_raspolozheniya', `%${query}%`)
                        .limit(5);
                    
                    if (error1) throw error1;
                    if (error2) throw error2;
                    
                    // Combine results and remove duplicates by address
                    const allAddresses = [...(addresses1 || []), ...(addresses2 || [])];
                    const uniqueAddresses = [];
                    const seenAddresses = new Set();
                    
                    for (const addr of allAddresses) {
                        const addressKey = (addr.adres_razmeshcheniya || addr.adres_raspolozheniya || '').toLowerCase().trim();
                        if (!seenAddresses.has(addressKey)) {
                            seenAddresses.add(addressKey);
                            uniqueAddresses.push(addr);
                        }
                    }
                    
                    const suggestionsDiv = document.getElementById('addressSuggestions');
                    
                    if (!uniqueAddresses || uniqueAddresses.length === 0) {
                        suggestionsDiv.innerHTML = '';
                        return;
                    }
                    
                    let html = '<div style="position:absolute;top:100%;left:0;right:0;background:var(--secondary);border:1px solid var(--border);border-radius:8px;z-index:1000;max-height:300px;overflow-y:auto;box-shadow:var(--glow-cyan)">';
                    
                    uniqueAddresses.forEach((addr, index) => {
                        const addrId = 'addr-' + index + '-' + Date.now();
                        const address = addr.adres_razmeshcheniya || addr.adres_raspolozheniya || '';
                        const skName = addr.naimenovanie_sk1 || '';
                        const rayon = addr.rayon || addr.ploshchadka || '';
                        const servisnyyId = addr.servisnyy_id || '';
                        
                        html += `
                            <div id="${addrId}" style="padding:12px;cursor:pointer;border-bottom:1px solid var(--border);transition:all 0.2s"
                                 onmouseover="this.style.background='rgba(0,217,255,0.1)'"
                                 onmouseout="this.style.background='transparent'">
                                <div style="font-weight:600;color:var(--accent)">${address}</div>
                                ${skName ? `<div style="font-size:12px;color:var(--text-muted)">СК: ${skName}</div>` : ''}
                                ${rayon ? `<div style="font-size:12px;color:var(--text-muted)">Район: ${rayon}</div>` : ''}
                                ${servisnyyId ? `<div style="font-size:11px;color:var(--text-muted)">ID: ${servisnyyId}</div>` : ''}
                            </div>
                        `;
                        
                        // Add click handler - load full data on click
                        setTimeout(() => {
                            const element = document.getElementById(addrId);
                            if (element) {
                                element.onclick = async function() {
                                    // Load full data for this address
                                    const fullAddressData = await loadFullAddressData(address);
                                    if (fullAddressData) {
                                        fillInstallationFields(fullAddressData);
                                        document.getElementById('instAddress').value = address;
                                        document.getElementById('addressSuggestions').innerHTML = '';
                                    }
                                };
                            }
                        }, 0);
                    });
                    
                    html += '</div>';
                    suggestionsDiv.innerHTML = html;
                } catch (error) {
                    console.error('Address search error:', error);
                    console.log('Error details:', error.message);
                }
            }, 300);
        };

            // Check for КАСИП АЗМ format (id_konditsionera1, id_konditsionera2, ... id_konditsionera5)
            if (sks.length === 0) {
                for (let i = 1; i <= 5; i++) {
                    const idCond = data[`id_konditsionera${i}`];
                    const naimenovanie = data[`naimenovanie_sk${i}`];
                    const status = data[`status_sk${i}`];

                            tip_sk_po_dogovoru: tip,

                                    <input type="text" id="sk_name_${idx}" value="${sk.naimenovanie_sk || ''}" readonly style="width:100%;background:rgba(255,255,255,0.05);border:none;padding:6px;border-radius:4px">
                                </div>

            // Plan dates - ATSS has planovaya_data_1_kv_2026, КАСИП АЗМ has plan_yanvar, plan_fevral, plan_mart
            if (data.planovaya_data_1_kv_2026) {

            console.log('Fields filled successfully, SK count:', sks.length);

        window.createInstallation = async function() {
            const title = document.getElementById('instTitle').value;
            const description = document.getElementById('instDescription').value;
            const project_id = document.getElementById('instProject').value;
            const assignee_id = document.getElementById('instAssignee').value;

            const scheduled_at = document.getElementById('instScheduledAt').value;

            const id_ploshadki = document.getElementById('instIdPloshadki').value;
            const servisnyy_id = document.getElementById('instServisnyyId').value;
            const rayon = document.getElementById('instRayon').value;
            const id_sk = document.getElementById('instIdSk').value;
            const naimenovanie_sk = document.getElementById('instNaimenovanieSk').value;
            const status_oborudovaniya = document.getElementById('instStatusOborudovaniya').value;
            const tip_sk_po_dogovoru = document.getElementById('instTipSkPoDogovoru').value;
            const planovaya_data_str = document.getElementById('instPlanovayaData').value;
            
            if (!title) {
                showToast('Введите название монтажа');
                return;
            }
            
            try {
                const installationData = {
                    title,
                    description,
                    project_id: project_id || null,
                    assignee_id: assignee_id || null,
                    address,
                    scheduled_at: scheduled_at || null,
                    status,
                    created_by: currentUserProfile?.id
                };
                
                // Add quarter_2026 fields if they exist
                if (id_ploshadki) installationData.id_ploshadki = parseInt(id_ploshadki);
                if (servisnyy_id) installationData.servisnyy_id = servisnyy_id;
                if (rayon) installationData.rayon = rayon;
                if (id_sk) installationData.id_sk = parseInt(id_sk);
                if (naimenovanie_sk) installationData.naimenovanie_sk = naimenovanie_sk;
                if (status_oborudovaniya) installationData.status_oborudovaniya = status_oborudovaniya;
                if (tip_sk_po_dogovoru) installationData.tip_sk_po_dogovoru = parseInt(tip_sk_po_dogovoru);
                if (planovaya_data_str) {
                    const planovaya_date = new Date(planovaya_data_str);
                    installationData.planovaya_data_1_kv_2026 = Math.floor(planovaya_date.getTime() / 1000);
                }

                    `<option value="${m.id}" data-name="${m.name}" data-unit="${m.default_unit}">${m.name} (${m.category})</option>`
                ).join('') || '';
                
                const div = document.createElement('div');
                div.innerHTML = `
                    <hr style="margin:16px 0">
                    <div class="form-group">
                        <label>Позиция ${count} - Материал</label>
                        <select id="prItem${count}Material" onchange="handleMaterialSelect(${count})">
                            <option value="">-- Выберите материал --</option>
                            ${materialOptions}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Название (если свое)</label>
                        <input type="text" id="prItem${count}Name" placeholder="Свое название">
                    </div>
                    <div style="display:flex;gap:8px">
                        <div class="form-group" style="flex:1">
                            <label>Количество</label>
                            <input type="number" id="prItem${count}Qty" value="1" min="1">
                        </div>
                        <div class="form-group" style="flex:1">
                            <label>Единица</label>
                            <select id="prItem${count}Unit">
                                <option value="pcs">шт</option>
                                <option value="m">м</option>
                                <option value="m2">м2</option>
                                <option value="m3">м3</option>
                                <option value="l">л</option>
                                <option value="kg">кг</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Примечание</label>
                        <input type="text" id="prItem${count}Note" placeholder="Примечание">
                    </div>
                `;
                container.appendChild(div);
            });
        };
        
        window.createPR = async function() {
            const items = [];
            let i = 1;
            
            while (document.getElementById('prItem' + i + 'Name')) {
                const name = document.getElementById('prItem' + i + 'Name').value;
                if (name) {
                    items.push({
                        name,
                        quantity: parseFloat(document.getElementById('prItem' + i + 'Qty').value) || 1,
                        unit: document.getElementById('prItem' + i + 'Unit').value,
                        note: document.getElementById('prItem' + i + 'Note').value
                    });
                }
                i++;
            }
            
            if (items.length === 0) {
                showToast('Добавьте хотя бы одну позицию');
                return;
            }
            
            try {
                // Create the PR
                const prData = {
                    status: 'pending',
                    created_by: currentUserProfile?.id
                };
                
                if (prType === 'task' && prRefId) {
                    prData.task_id = prRefId;
                } else if (prType === 'installation' && prRefId) {
                    prData.installation_id = prRefId;
                }
                
                const { data: pr, error: prError } = await supabase
                    .from('purchase_requests')
                    .insert([prData])
                    .select()
                    .single();
                
                if (prError) throw prError;
                
                // Add items
                const itemsWithPRId = items.map(item => ({
                    purchase_request_id: pr.id,
                    ...item
                }));
                
                const { error: itemsError } = await supabase
                    .from('purchase_request_items')
                    .insert(itemsWithPRId);
                
                if (itemsError) throw itemsError;
                
                closeModal();
                showToast('Заявка создана');
                
                // Refresh the current view
                if (currentView === 'purchaseRequests') {
                    renderPurchaseRequests(document.getElementById('content'));
                } else if (currentView === 'tasks' && prType === 'task') {
                    showTaskDetail(prRefId);
                } else if (currentView === 'installations' && prType === 'installation') {
                    showInstallationDetail(prRefId);
                }
            } catch (error) {
                showToast('Ошибка: ' + error.message);
            }
        };

        // ============================================================
        // CALENDAR
        // ============================================================
        async function renderCalendar(content) {
            const year = calendarDate.getFullYear();
            const month = calendarDate.getMonth();
            
            const monthNames = ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь', 
                              'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'];
            
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const startDay = firstDay.getDay() || 7;
            const totalDays = lastDay.getDate();
            
            // Get tasks and installations for this month
            const startDate = new Date(year, month, 1).toISOString();
            const endDate = new Date(year, month + 1, 0).toISOString();
            
            const [tasks, installations] = await Promise.all([
                supabase.from('tasks').select('id, title, status, due_date').gte('due_date', startDate).lte('due_date', endDate),
                supabase.from('installations').select('id, title, status, scheduled_at').gte('scheduled_at', startDate).lte('scheduled_at', endDate)
            ]);
            
            let html = `
                <h2 style="margin-bottom: 16px">Календарь</h2>
                <div class="calendar">
                    <div class="calendar-header">
                        <button class="calendar-nav" onclick="changeMonth(-1)">◀</button>
                        <div class="calendar-month">${monthNames[month]} ${year}</div>
                        <button class="calendar-nav" onclick="changeMonth(1)">▶</button>
                    </div>
                    <div class="calendar-weekdays">
                        <div class="calendar-weekday">Пн</div>
                        <div class="calendar-weekday">Вт</div>
                        <div class="calendar-weekday">Ср</div>
                        <div class="calendar-weekday">Чт</div>
                        <div class="calendar-weekday">Пт</div>
                        <div class="calendar-weekday">Сб</div>
                        <div class="calendar-weekday">Вс</div>
                    </div>
                    <div class="calendar-days">
            `;
            
            // Previous month days
            const prevMonthDays = new Date(year, month, 0).getDate();
            for (let i = startDay - 1; i > 0; i--) {
                html += `<div class="calendar-day other-month">${prevMonthDays - i + 1}</div>`;
            }
            
            // Current month days
            const today = new Date();
            for (let day = 1; day <= totalDays; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const isToday = today.getDate() === day && today.getMonth() === month && today.getFullYear() === year;
                
                // Check for items on this day
                const dayTasks = tasks.data?.filter(t => t.due_date && t.due_date.startsWith(dateStr)) || [];
                const dayInstallations = installations.data?.filter(i => i.scheduled_at && i.scheduled_at.startsWith(dateStr)) || [];
                const hasItems = dayTasks.length > 0 || dayInstallations.length > 0;
                
                html += `
                    <div class="calendar-day ${isToday ? 'today' : ''} ${hasItems ? 'has-items' : ''}" onclick="showCalendarDay('${dateStr}')">
                        ${day}
                        ${hasItems ? `<div class="calendar-day-items">${dayTasks.length + dayInstallations.length}</div>` : ''}
                    </div>
                `;
            }
            
            // Next month days
            const remainingDays = 42 - (startDay - 1 + totalDays);
            for (let day = 1; day <= remainingDays; day++) {
                html += `<div class="calendar-day other-month">${day}</div>`;
            }
            
            html += `
                    </div>
                </div>
            `;
            
            content.innerHTML = html;
        }
        
        window.changeMonth = function(delta) {
            calendarDate.setMonth(calendarDate.getMonth() + delta);
            renderContent();
        };
        
        window.showCalendarDay = async function(dateStr) {
            const [tasks, installations] = await Promise.all([
                supabase.from('tasks').select('*').like('due_date', dateStr + '%'),
                supabase.from('installations').select('*').like('scheduled_at', dateStr + '%')
            ]);
            
            let html = `
                <button class="btn btn-outline btn-sm" onclick="navigate('calendar')" style="margin-bottom: 16px">← Назад к календарю</button>
                <h2 style="margin-bottom: 16px">${new Date(dateStr).toLocaleDateString('ru-RU')}</h2>
            `;
            
            if (tasks.data && tasks.data.length > 0) {
                html += `<h3 class="section-title">Задачи</h3>`;
                tasks.data.forEach(task => {
                    html += `
                        <div class="calendar-item" onclick="showTaskDetail('${task.id}')">
                            <div class="list-item-title">${task.title}</div>
                            <span class="status status-${task.status}">${getStatusLabel(task.status)}</span>
                        </div>
                    `;
                });
            }
            
            if (installations.data && installations.data.length > 0) {
                html += `<h3 class="section-title">Монтажи</h3>`;
                installations.data.forEach(inst => {
                    html += `
                        <div class="calendar-item installation" onclick="window.showInstallationDetail('${inst.id}')">
                            <div class="list-item-title">${inst.title}</div>
                            <div class="calendar-item-time">${inst.scheduled_at ? new Date(inst.scheduled_at).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' }) : ''}</div>
                        </div>
                    `;
                });
            }
            
            if ((!tasks.data || tasks.data.length === 0) && (!installations.data || installations.data.length === 0)) {
                html += '<div class="empty-state"><p>Нет запланированных задач</p></div>';
            }
            
            document.getElementById('content').innerHTML = html;
        };

        // ============================================================
        // SCHEME
        // ============================================================

            const isManager = isElevatedUser();
            
            const [projects, tasks, installations] = await Promise.all([
                isManager ? supabase.from('projects').select('*').order('created_at', { ascending: false }) : Promise.resolve({ data: [] }),

            ]);
            
            let html = `
                <h2 style="margin-bottom: 16px">Схема</h2>

            const completedTasks = tasks.data?.filter(t => t.status === 'done').length || 0;

            html += `
                <div class="stats-grid">
                    <div class="stat-card">

                        <div class="stat-label">Проектов</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${taskCount}</div>
                        <div class="stat-label">Задач</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${installationCount}</div>
                        <div class="stat-label">Монтажей</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${completedTasks + completedInstallations}</div>

                    </div>
                </div>

            const totalItems = taskCount + installationCount;
            const completedItems = completedTasks + completedInstallations;

            html += `
                <div class="card">
                    <h3 class="section-title">Общий прогресс</h3>
                    <div style="background: var(--secondary); height: 20px; border-radius: 10px; overflow: hidden; margin-bottom: 8px;">
                        <div style="background: linear-gradient(90deg, var(--accent), var(--accent2)); height: 100%; width: ${progress}%; transition: width 0.3s ease;"></div>
                    </div>
                    <p style="text-align: center; color: var(--text-muted)">${progress}% выполнено</p>
                </div>
            `;
            
            // Status breakdown
            const taskStatuses = {};
            tasks.data?.forEach(t => {
                taskStatuses[t.status] = (taskStatuses[t.status] || 0) + 1;
            });

            installations.data?.forEach(i => {
                instStatuses[i.status] = (instStatuses[i.status] || 0) + 1;
            });
            
            html += `
                <div class="card">
                    <h3 class="section-title">Статусы задач</h3>
                    ${Object.entries(taskStatuses).map(([status, count]) => `
                        <div class="item-row">
                            <span>${getStatusLabel(status)}</span>
                            <span class="status status-${status}">${count}</span>
                        </div>
                    `).join('')}
                </div>
                
                <div class="card">
                    <h3 class="section-title">Статусы монтажей</h3>
                    ${Object.entries(instStatuses).map(([status, count]) => `
                        <div class="item-row">
                            <span>${getStatusLabel(status)}</span>
                            <span class="status status-${status}">${count}</span>

            content.innerHTML = html;
        }

        // ============================================================
        // EVENT LISTENERS
        // ============================================================
        // Auth tabs - using event delegation
        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', function(e) {
                const tabName = this.getAttribute('data-tab');
                if (tabName) {
                    showAuthTab(tabName);
                    // Manually set active class since event.target might be different
                    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                }
            });
        });

        // ============================================================
        // MATRIX RAIN EFFECT
        // ============================================================
        function matrixRain() {
            const canvas = document.getElementById('matrix-canvas');
            const ctx = canvas.getContext('2d');

            // Set canvas size to window size
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // Matrix characters
            const matrix = "アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            const matrixArray = matrix.split("");

            const fontSize = 16;
            const columns = canvas.width / fontSize;
            const drops = [];

            // Initialize drops
            for (let x = 0; x < columns; x++) {
                drops[x] = 1;
            }

            function draw() {
                // Black background with slight transparency for trail effect
                ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Green text
                ctx.fillStyle = '#00FF88';
                ctx.font = fontSize + 'px monospace';

                // Loop over drops
                for (let i = 0; i < drops.length; i++) {
                    // Random character
                    const text = matrixArray[Math.floor(Math.random() * matrixArray.length)];

                    // Draw the character
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                    // Reset drop to top randomly
                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                        drops[i] = 0;
                    }

                    // Move drop down
                    drops[i]++;
                }
            }

            // Animate
            setInterval(draw, 80);
        }

        // ============================================================
        // SWIPE TO DELETE FUNCTIONALITY
        // ============================================================
        let touchStartX = 0;
        let touchStartY = 0;
        let currentSwipeItem = null;

        // Initialize swipe functionality on content
        function initSwipeHandlers() {
            document.querySelectorAll('.card').forEach(card => {
                if (!card.closest('.modal')) {
                    card.addEventListener('touchstart', handleTouchStart, { passive: true });
                    card.addEventListener('touchmove', handleTouchMove, { passive: false });
                    card.addEventListener('touchend', handleTouchEnd);
                }
            });
        }

        function handleTouchStart(e) {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            currentSwipeItem = e.currentTarget;
        }

        function handleTouchMove(e) {
            if (!currentSwipeItem) return;
            
            const touchCurrentX = e.touches[0].clientX;
            const touchCurrentY = e.touches[0].clientY;
            
            const diffX = touchCurrentX - touchStartX;
            const diffY = touchCurrentY - touchStartY;
            
            // Only handle horizontal swipe (more than 50px and less vertical movement)
            if (Math.abs(diffX) > 50 && Math.abs(diffX) > Math.abs(diffY)) {
                e.preventDefault();
                
                if (diffX < 0) {
                    // Swipe left - show delete action
                    currentSwipeItem.style.transform = `translateX(${diffX}px)`;
                    
                    // Add visual feedback for delete (red)
                    if (diffX < -100) {
                        currentSwipeItem.style.background = 'rgba(255, 51, 102, 0.2)';
                    } else {
                        currentSwipeItem.style.background = '';
                    }
                } else if (diffX > 0) {
                    // Swipe right - show description action (cyan glow)
                    currentSwipeItem.style.transform = `translateX(${diffX}px)`;
                    
                    // Add visual feedback for description (cyan)
                    if (diffX > 100) {
                        currentSwipeItem.style.background = 'rgba(0, 217, 255, 0.2)';
                    } else {
                        currentSwipeItem.style.background = '';
                    }
                }
            }
        }

        function handleTouchEnd(e) {
            if (!currentSwipeItem) return;
            
            const touchEndX = e.changedTouches[0].clientX;
            const diffX = touchEndX - touchStartX;
            
            const itemId = currentSwipeItem.getAttribute('data-id');
            const itemType = currentSwipeItem.getAttribute('data-type');
            
            // If swiped left more than 100px, show delete confirmation
            if (diffX < -100) {
                if (itemId && itemType) {
                    showDeleteConfirmation(itemId, itemType);
                }
            }
            // If swiped right more than 100px, open detail
            else if (diffX > 100) {
                if (itemId && itemType) {
                    if (itemType === 'task') {
                        showTaskDetail(itemId);
                    } else if (itemType === 'installation') {
                        window.showInstallationDetail(itemId);
                    } else if (itemType === 'pr') {
                        showPRDetailModal(itemId);
                    }
                }
            }
            
            // Reset transform
            currentSwipeItem.style.transform = '';
            currentSwipeItem.style.background = '';
            currentSwipeItem = null;
        }

        function showDeleteConfirmation(id, type) {
            let message = '';
            let confirmText = 'Удалить';
            
            switch(type) {
                case 'task':
                    message = 'Вы уверены, что хотите удалить эту задачу?';
                    break;
                case 'installation':
                    message = 'Вы уверены, что хотите удалить этот монтаж?';
                    break;
                case 'pr':
                    message = 'Вы уверены, что хотите удалить эту заявку?';
                    break;
                default:
                    message = 'Вы уверены, что хотите удалить этот элемент?';
            }
            
            if (confirm(message)) {
                deleteItem(id, type);
            }
        }

        async function deleteItem(id, type) {
            const token = localStorage.getItem('token');
            try {
                switch(type) {
                    case 'task':
                        await supabase.from('tasks').delete().eq('id', id);
                        showToast('Задача удалена');
                        renderTasks(document.getElementById('content'));
                        break;
                    case 'installation':
                        await supabase.from('installations').delete().eq('id', id);
                        showToast('Монтаж удален');
                        renderInstallations(document.getElementById('content'));
                        break;
                    case 'pr':
                        await supabase.from('purchase_request_items').delete().eq('purchase_request_id', id);
                        await supabase.from('purchase_requests').delete().eq('id', id);
                        showToast('Заявка удалена');
                        renderPurchaseRequests(document.getElementById('content'));
                        break;
                }
            } catch (error) {
                console.error('Delete error:', error);
                showToast('Ошибка при удалении: ' + error.message);
            }
        }

        // Modified render functions to add swipe support
        const originalRenderTasks = renderTasks;
        renderTasks = async function(content) {
            await originalRenderTasks(content);
            initSwipeHandlers();
        };

        const originalRenderInstallations = renderInstallations;
        renderInstallations = async function(content) {
            await originalRenderInstallations(content);
            initSwipeHandlers();
        };

        const originalRenderPurchaseRequests = renderPurchaseRequests;
        renderPurchaseRequests = async function(content) {
            await originalRenderPurchaseRequests(content);
            initSwipeHandlers();
        };

        // ============================================================
        // INITIALIZATION
        // ============================================================
        // Start the app
        initApp();
    </script>
