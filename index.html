        window.createPR = async function() {
            const items = [];
            let i = 1;
            
            while (document.getElementById('prItem' + i + 'Name')) {
                const name = document.getElementById('prItem' + i + 'Name').value;
                if (name) {
                    items.push({
                        name,
                        quantity: parseFloat(document.getElementById('prItem' + i + 'Qty').value) || 1,
                        unit: document.getElementById('prItem' + i + 'Unit').value,
                        note: document.getElementById('prItem' + i + 'Note').value
                    });
                }
                i++;
            }
            
            if (items.length === 0) {
                showToast('Добавьте хотя бы одну позицию');
                return;
            }
            
            try {
                // Create the PR
                const prData = {
                    status: 'pending',
                    created_by: currentUserProfile?.id
                };
                
                if (prType === 'task' && prRefId) {
                    prData.task_id = prRefId;
                } else if (prType === 'installation' && prRefId) {
                    prData.installation_id = prRefId;
                }
                
                const { data: pr, error: prError } = await supabase
                    .from('purchase_requests')
                    .insert([prData])
                    .select()
                    .single();
                
                if (prError) throw prError;
                
                // Add items
                const itemsWithPRId = items.map(item => ({
                    purchase_request_id: pr.id,
                    ...item
                }));
                
                const { error: itemsError } = await supabase
                    .from('purchase_request_items')
                    .insert(itemsWithPRId);
                
                if (itemsError) throw itemsError;
                
                closeModal();
                showToast('Заявка создана');
                
                // Refresh the current view
                if (currentView === 'purchaseRequests') {
                    renderPurchaseRequests(document.getElementById('content'));
                } else if (currentView === 'tasks' && prType === 'task') {
                    showTaskDetail(prRefId);
                } else if (currentView === 'installations' && prType === 'installation') {
                    showInstallationDetail(prRefId);
                }
            } catch (error) {
                showToast('Ошибка: ' + error.message);
            }
        };

        // ============================================================
        // CALENDAR
        // ============================================================
        async function renderCalendar(content) {
            const year = calendarDate.getFullYear();
            const month = calendarDate.getMonth();
            
            const monthNames = ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь', 
                              'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'];
            
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const startDay = firstDay.getDay() || 7;
            const totalDays = lastDay.getDate();
            
            // Get tasks and installations for this month
            const startDate = new Date(year, month, 1).toISOString();
            const endDate = new Date(year, month + 1, 0).toISOString();
            
            // Get all users for filter
            const { data: users } = await supabase.from('users').select('id, name');
            
            // Get tasks and installations for the month
            const [monthTasks, monthInstallations] = await Promise.all([
                supabase.from('tasks').select('id, title, status, due_date, assignee_id').gte('due_date', startDate).lte('due_date', endDate),
                supabase.from('installations').select('id, title, status, scheduled_at, assignee_id').gte('scheduled_at', startDate).lte('scheduled_at', endDate)
            ]);
            
            // Apply executor filter if selected
            let filteredTasks = monthTasks.data;
            let filteredInstallations = monthInstallations.data;
            
            // Get current filter value (if any)
            const currentFilter = document.getElementById('calendarExecutorFilter')?.value || 'all';
            if (currentFilter !== 'all') {
                filteredTasks = monthTasks.data?.filter(t => t.assignee_id === currentFilter) || [];
                filteredInstallations = monthInstallations.data?.filter(i => i.assignee_id === currentFilter) || [];
            }
            
            let html = `
                <h2 style="margin-bottom: 16px">Календарь</h2>
                <div class="calendar">
                    <div class="calendar-header">
                        <button class="calendar-nav" onclick="changeMonth(-1)">◀</button>
                        <div class="calendar-month">${monthNames[month]} ${year}</div>
                        <button class="calendar-nav" onclick="changeMonth(1)">▶</button>
                    </div>
                    <div class="calendar-weekdays">
                        <div class="calendar-weekday">Пн</div>
                        <div class="calendar-weekday">Вт</div>
                        <div class="calendar-weekday">Ср</div>
                        <div class="calendar-weekday">Чт</div>
                        <div class="calendar-weekday">Пт</div>
                        <div class="calendar-weekday">Сб</div>
                        <div class="calendar-weekday">Вс</div>
                    </div>
                    <div class="calendar-days">
            `;
            
            // Previous month days
            const prevMonthDays = new Date(year, month, 0).getDate();
            for (let i = startDay - 1; i > 0; i--) {
                html += `<div class="calendar-day other-month">${prevMonthDays - i + 1}</div>`;
            }
            
            // Current month days
            const today = new Date();
            for (let day = 1; day <= totalDays; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const isToday = today.getDate() === day && today.getMonth() === month && today.getFullYear() === year;
                
                // Check for items on this day
                let dayTasks = filteredTasks?.filter(t => t.due_date && t.due_date.startsWith(dateStr)) || [];
                let dayInstallations = filteredInstallations?.filter(i => i.scheduled_at && i.scheduled_at.startsWith(dateStr)) || [];
                const hasItems = dayTasks.length > 0 || dayInstallations.length > 0;
                
                html += `
                    <div class="calendar-day ${isToday ? 'today' : ''} ${hasItems ? 'has-items' : ''}" onclick="showCalendarDay('${dateStr}')">
                        ${day}
                        ${hasItems ? `<div class="calendar-day-items">${dayTasks.length + dayInstallations.length}</div>` : ''}
                    </div>
                `;
            }
            
            // Next month days
            const remainingDays = 42 - (startDay - 1 + totalDays);
            for (let day = 1; day <= remainingDays; day++) {
                html += `<div class="calendar-day other-month">${day}</div>`;
            }
            
            html += `
                    </div>
                </div>
                
                <!-- Filter by executor -->
                <div class="card" style="margin-top: 16px;">
                    <h3 class="section-title">Фильтр по исполнителю</h3>
                    <select id="calendarExecutorFilter" class="form-group" onchange="applyCalendarExecutorFilter()" style="width: 100%">
                        <option value="all">Все исполнители</option>
                        ${(users || []).map(u => `<option value="${u.id}">${u.name}</option>`).join('')}
                    </select>
                </div>
            `;
            
            content.innerHTML = html;
        }
        
        window.changeMonth = function(delta) {
            calendarDate.setMonth(calendarDate.getMonth() + delta);
            renderContent();
        };
        
        window.applyCalendarExecutorFilter = async function() {
            const executorId = document.getElementById('calendarExecutorFilter').value;
            console.log('Filter by executor:', executorId);
            
            // Re-render calendar with filter
            await renderCalendar(document.getElementById('content'));
        };
        
        window.showCalendarDay = async function(dateStr) {
            console.log('Showing day:', dateStr);
            
            // Get selected executor filter
            const executorId = document.getElementById('calendarExecutorFilter')?.value || 'all';
            
            // Get full date range for the day
            const dayStart = new Date(dateStr).toISOString();
            const dayEnd = new Date(new Date(dateStr).setDate(new Date(dateStr).getDate() + 1)).toISOString();
            
            // Build query with optional executor filter
            let tasksQuery = supabase.from('tasks').select('*');
            let installationsQuery = supabase.from('installations').select('*');
            
            if (executorId !== 'all') {
                tasksQuery = tasksQuery.eq('assignee_id', executorId);
                installationsQuery = installationsQuery.eq('assignee_id', executorId);
            }
            
            const [tasks, installations] = await Promise.all([
                tasksQuery.gte('due_date', dayStart).lt('due_date', dayEnd),
                installationsQuery.gte('scheduled_at', dayStart).lt('scheduled_at', dayEnd)
            ]);
            
            console.log('Tasks:', tasks.data?.length, 'Installations:', installations.data?.length);
            
            let html = `
                <button class="btn btn-outline btn-sm" onclick="navigate('calendar')" style="margin-bottom: 16px">← Назад к календарю</button>
                <h2 style="margin-bottom: 16px">${new Date(dateStr).toLocaleDateString('ru-RU', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</h2>
            `;
            
            if (tasks.data && tasks.data.length > 0) {
                html += `<h3 class="section-title">Задачи (${tasks.data.length})</h3>`;
                tasks.data.forEach(task => {
                    html += `
                        <div class="card card-clickable" onclick="window.showTaskDetail('${task.id}')">
                            <div class="list-item-header">
                                <div class="list-item-title">${task.title}</div>
                                <span class="status status-${task.status}">${getStatusLabel(task.status)}</span>
                            </div>
                            ${task.users?.name ? `<div class="list-item-subtitle">${task.users.name}</div>` : ''}
                        </div>
                    `;
                });
            }
            
            if (installations.data && installations.data.length > 0) {
                html += `<h3 class="section-title">Монтажи (${installations.data.length})</h3>`;
                installations.data.forEach(inst => {
                    html += `
                        <div class="card card-clickable" onclick="window.showInstallationDetail('${inst.id}')">
                            <div class="list-item-header">
                                <div class="list-item-title">${inst.title}</div>
                                <span class="status status-${inst.status}">${getStatusLabel(inst.status)}</span>
                            </div>
                            ${inst.address ? `<div class="list-item-subtitle">${inst.address}</div>` : ''}
                            <div class="calendar-item-time">${inst.scheduled_at ? new Date(inst.scheduled_at).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' }) : ''}</div>
                        </div>
                    `;
                });
            }
            
            if ((!tasks.data || tasks.data.length === 0) && (!installations.data || installations.data.length === 0)) {
                html += '<div class="empty-state"><p>Нет запланированных задач и монтажей</p></div>';
            }
            
            document.getElementById('content').innerHTML = html;
        };

            const taskCount = tasks.data?.length || 0;
            const installationCount = installations.data?.length || 0;

                        <div class="stat-label">Выполнено</div>
                    </div>
                </div>
            `;
            
            // Simple progress visualization

            html += `

        // ============================================================
        // MATRIX RAIN EFFECT
        // ============================================================
        function matrixRain() {
            const canvas = document.getElementById('matrix-canvas');
            const ctx = canvas.getContext('2d');

            // Set canvas size to window size
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // Matrix characters
            const matrix = "アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            const matrixArray = matrix.split("");

            const fontSize = 16;
            const columns = canvas.width / fontSize;
            const drops = [];

            // Initialize drops
            for (let x = 0; x < columns; x++) {
                drops[x] = 1;
            }

            function draw() {
                // Black background with slight transparency for trail effect
                ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Green text
                ctx.fillStyle = '#00FF88';
                ctx.font = fontSize + 'px monospace';

                // Loop over drops
                for (let i = 0; i < drops.length; i++) {
                    // Random character
                    const text = matrixArray[Math.floor(Math.random() * matrixArray.length)];

                    // Draw the character
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                    // Reset drop to top randomly
                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                        drops[i] = 0;
                    }

                    // Move drop down
                    drops[i]++;
                }
            }

            // Animate
            setInterval(draw, 80);
        }

        // ============================================================
        // SWIPE TO DELETE FUNCTIONALITY
        // ============================================================
        let touchStartX = 0;
        let touchStartY = 0;
        let currentSwipeItem = null;

        // Initialize swipe functionality on content
        function initSwipeHandlers() {
            document.querySelectorAll('.card').forEach(card => {
                if (!card.closest('.modal')) {
                    card.addEventListener('touchstart', handleTouchStart, { passive: true });
                    card.addEventListener('touchmove', handleTouchMove, { passive: false });
                    card.addEventListener('touchend', handleTouchEnd);
                }
            });
        }

        function handleTouchStart(e) {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            currentSwipeItem = e.currentTarget;
        }

        function handleTouchMove(e) {
            if (!currentSwipeItem) return;
            
            const touchCurrentX = e.touches[0].clientX;
            const touchCurrentY = e.touches[0].clientY;
            
            const diffX = touchCurrentX - touchStartX;
            const diffY = touchCurrentY - touchStartY;
            
            // Only handle horizontal swipe (more than 50px and less vertical movement)
            if (Math.abs(diffX) > 50 && Math.abs(diffX) > Math.abs(diffY)) {
                e.preventDefault();
                
                if (diffX < 0) {
                    // Swipe left - show delete action
                    currentSwipeItem.style.transform = `translateX(${diffX}px)`;
                    
                    // Add visual feedback for delete (red)
                    if (diffX < -100) {
                        currentSwipeItem.style.background = 'rgba(255, 51, 102, 0.2)';
                    } else {
                        currentSwipeItem.style.background = '';
                    }
                } else if (diffX > 0) {
                    // Swipe right - show description action (cyan glow)
                    currentSwipeItem.style.transform = `translateX(${diffX}px)`;
                    
                    // Add visual feedback for description (cyan)
                    if (diffX > 100) {
                        currentSwipeItem.style.background = 'rgba(0, 217, 255, 0.2)';
                    } else {
                        currentSwipeItem.style.background = '';
                    }
                }
            }
        }

        function handleTouchEnd(e) {
            if (!currentSwipeItem) return;
            
            const touchEndX = e.changedTouches[0].clientX;
            const diffX = touchEndX - touchStartX;
            
            const itemId = currentSwipeItem.getAttribute('data-id');
            const itemType = currentSwipeItem.getAttribute('data-type');
            
            // If swiped left more than 100px, show delete confirmation
            if (diffX < -100) {
                if (itemId && itemType) {
                    showDeleteConfirmation(itemId, itemType);
                }
            }
            // If swiped right more than 100px, open detail
            else if (diffX > 100) {
                if (itemId && itemType) {
                    if (itemType === 'task') {
                        showTaskDetail(itemId);
                    } else if (itemType === 'installation') {
                        window.showInstallationDetail(itemId);
                    } else if (itemType === 'pr') {
                        showPRDetailModal(itemId);
                    }
                }
            }
            
            // Reset transform
            currentSwipeItem.style.transform = '';
            currentSwipeItem.style.background = '';
            currentSwipeItem = null;
        }

          switch(format) {
            case 'bold': newText = `**${selectedText || 'жирный текст'}**`; break;
            case 'italic': newText = `*${selectedText || 'курсив'}*`; break;
            case 'code': newText = `\`${selectedText || 'код'}\``; break;
            case 'quote': newText = `> ${selectedText || 'цитата'}`; break;
          }
          input.value = before + newText + after;
          input.focus();
          input.selectionStart = start + newText.indexOf(selectedText || newText.replace(/[\*\`>]/g, ''));
          input.selectionEnd = start + newText.indexOf(selectedText || newText.replace(/[\*\`>]/g, '')) + (selectedText.length || newText.length - 4);
        };
        
        const emojiList = ['👍', '❤️', '😊', '🎉', '🔥', '👀', '✅', '❌', '💡', '📌', '⭐', '🚀', '💬', '📎', '🔔'];
        window.toggleEmojiPicker= function() {
          const picker= document.getElementById('emojiPicker');
          if (!picker) return;
          if (picker.style.display === 'none') {
            picker.style.display = 'flex';
            picker.innerHTML = emojiList.map(emoji => `<span onclick="insertEmoji('${emoji}')" style="cursor:pointer;padding:4px;font-size:18px:hover{transform:scale(1.2)}">${emoji}</span>`).join('');
          } else {picker.style.display = 'none';}
        };
        window.insertEmoji = function(emoji) {
          const input = document.getElementById('commentInput');
          input.value += emoji;
          input.focus();
          document.getElementById('emojiPicker').style.display = 'none';
        };
        window.attachFile = function() {document.getElementById('fileInput').click();};
        window.handleFileSelect = function(event) {
          const file= event.target.files[0];
          if (!file) return;
          if (file.size > 10485760) {showToast('❌ Файл слишком большой (максимум 10MB)'); event.target.value = ''; return;}
          selectedFile = file;
          const preview = document.getElementById('filePreview');
          if (file.type.startsWith('image/')) {
            const reader= new FileReader();
            reader.onload = function(e) {
              preview.innerHTML = `<div style="display:flex;align-items:center;gap:8px;margin-top:8px;padding:8px;background:#f9f9f9;border-radius:4px"><img src="${e.target.result}" style="width:50px;height:50px;object-fit:cover;border-radius:4px"><span style="font-size:12px;color:var(--text-muted)">${file.name}</span><button onclick="removeSelectedFile()" style="margin-left:auto;background:none;border:none;cursor:pointer;color:var(--danger)">✕</button></div>`;
            };
            reader.readAsDataURL(file);
          } else {
            preview.innerHTML = `<div style="display:flex;align-items:center;gap:8px;margin-top:8px;padding:8px;background:#f9f9f9;border-radius:4px"><span style="font-size:20px">📎</span><span style="font-size:12px;color:var(--text-muted)">${file.name}</span><button onclick="removeSelectedFile()" style="margin-left:auto;background:none;border:none;cursor:pointer;color:var(--danger)">✕</button></div>`;
          }
        };
        window.removeSelectedFile = function() {selectedFile= null; document.getElementById('fileInput').value = ''; document.getElementById('filePreview').innerHTML = '';};
        
        // === ФУНКЦИИ ДЛЯ КОММЕНТАРИЕВ В МОНТАЖАХ ===
        window.loadAndRenderInstallationComments = async function(instId) {
          const commentsList = document.getElementById('installationCommentsList');
          if (!commentsList) return;
          
          try {
            const { data: comments, error } = await supabase
              .from('comments')
              .select(`*,users(name, email)`)
              .eq('resource_id', instId)
              .eq('resource_type', 'installation')
              .order('created_at', { ascending: true });
            
            if (error) throw error;
            
            if (!comments || comments.length === 0) {
              commentsList.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:20px;">Нет комментариев. Будьте первыми! 💬</p>';
              return;
            }
            
            let html = '';
            comments.forEach(comment => {
              const isOwnComment = String(comment.user_id) === String(currentUserProfile?.id);
              const dateStr = new Date(comment.created_at).toLocaleString('ru-RU');
              const isEdited = comment.is_edited || false;
              const formattedMessage = formatCommentText(comment.message);
              
              html += `<div style="background:#f9f9f9;padding:12px;margin-bottom:10px;border-radius:6px">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
                  <div style="display:flex;align-items:center;gap:8px">
                    <div style="width:28px;height:28px;background:linear-gradient(135deg,var(--accent),var(--success));border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;font-size:12px">${(comment.users?.name || 'А')[0].toUpperCase()}</div>
                    <strong style="color:var(--accent)">${comment.users?.name || 'Аноним'}</strong>
                    ${isEdited ? '<span style="font-size:10px;color:var(--text-muted);font-style:normal">(изменено)</span>' : ''}
                  </div>
                  <span style="font-size:11px;color:var(--text-muted)">${dateStr}</span>
                </div>
                <div style="color:#000;line-height:1.6;margin-bottom:8px">${formattedMessage}</div>
                ${comment.file_url ? `<div style="margin-top:8px;padding:8px;background:white;border-radius:4px">${comment.file_name.match(/\.(jpg|jpeg|png|gif|webp)$/i) ? `<img src="${comment.file_url}" alt="${comment.file_name}" style="max-width:300px;border-radius:4px;cursor:pointer" onclick="window.open('${comment.file_url}', '_blank')"><div style="margin-top:4px"><a href="${comment.file_url}" download="${comment.file_name}" style="color:var(--accent);text-decoration:none;font-size:12px">📎 Скачать ${comment.file_name}</a></div>` : `<div style="display:flex;align-items:center;gap:8px"><span style="font-size:20px">📎</span><a href="${comment.file_url}" download="${comment.file_name}" style="color:var(--accent);text-decoration:none;font-size:13px">${comment.file_name}</a></div>`}</div>` : ''}
                <div style="display:flex;gap:8px;margin-top:8px">
                  ${isOwnComment ? `<button class="btn btn-sm" style="padding:4px 8px;font-size:11px;background:transparent;color:var(--text-muted);border:1px solid var(--text-muted)" onclick="editInstallationComment('${comment.id}', '${instId}')">✏️ Редактировать</button><button class="btn btn-sm btn-danger" style="padding:4px 8px;font-size:11px;background:#ef4444;border:none;color:white" onclick="deleteInstallationComment('${comment.id}', '${instId}')">🗑 Удалить</button>` : ''}
                </div>
              </div>`;
            });
            
            commentsList.innerHTML = html;
            commentsList.scrollTop = commentsList.scrollHeight;
            
          } catch (error) {
            console.error('Error loading installation comments:', error);
            commentsList.innerHTML = '<p style="color:var(--danger);text-align:center;padding:20px;">Ошибка загрузки комментариев</p>';
          }
        };
        
        window.sendInstallationComment = async function(instId) {
          const input = document.getElementById('commentInputInst');
          const message = input?.value.trim();
          const fileInput = document.getElementById('fileInputInst');
          const file = fileInput?.files[0];
          
          if (!message && !file) {
            showToast('⚠️ Введите текст или выберите файл');
            return;
          }
          
          try {
            let file_url = null;
            let file_name = null;
            
            if (file) {
              const uploadResult = await uploadCommentFile(file, instId);
              file_url = uploadResult.url;
              file_name = uploadResult.name;
            }
            
            const { data: comment, error } = await supabase
              .from('comments')
              .insert([{resource_id: instId, resource_type: 'installation', user_id: currentUserProfile?.id, message: message, file_url: file_url, file_name: file_name, is_edited: currentEditingCommentId ? true : false}])
              .select()
              .single();
            
            if (error) throw error;
            
            input.value = '';
            if (fileInput) fileInput.value = '';
            selectedFile= null;
            currentEditingCommentId = null;
            document.getElementById('filePreviewInst').innerHTML = '';
            loadAndRenderInstallationComments(instId);
            showToast('✅ Комментарий отправлен');
            
          } catch (error) {
            console.error('Error sending installation comment:', error);
            showToast('❌ Ошибка отправки комментария');
          }
        };
        
        window.editInstallationComment = async function(commentId, instId) {
          try {
            const { data: comment } = await supabase.from('comments').select('message').eq('id', commentId).single();
            if (!comment) throw new Error('Комментарий не найден');
            const input = document.getElementById('commentInputInst');
            input.value = comment.message;
            input.focus();
            currentEditingCommentId = commentId;
            const cancelBtn = document.createElement('button');
            cancelBtn.id = 'replyCancelBtn';
            cancelBtn.className = 'btn btn-outline';
            cancelBtn.textContent = 'Отмена редактирования';
            cancelBtn.onclick = () => {input.value = ''; currentEditingCommentId = null; cancelBtn.remove();};
            input.parentNode.appendChild(cancelBtn);
            showToast('✏️ Редактируйте комментарий и нажмите "Отправить"');
          } catch (error) {
            console.error('Error loading comment for edit:', error);
            showToast('❌ Ошибка загрузки комментария');
          }
        };
        
        window.deleteInstallationComment = async function(commentId, instId) {
          if (!confirm('Удалить комментарий?')) return;
          try {
            const { data: comment } = await supabase.from('comments').select('file_url').eq('id', commentId).single();
            if (comment && comment.file_url) {
              const fileName = comment.file_url.substring(comment.file_url.lastIndexOf('/') +1);
              const { error: storageError } = await supabase.storage.from('comment-files').remove([fileName]);
              if (storageError) console.error('Error deleting file:', storageError);
            }
            const { error } = await supabase.from('comments').delete().eq('id', commentId);
            if (error) throw error;
            loadAndRenderInstallationComments(instId);
            showToast('✅ Комментарий удален');
          } catch (error) {
            console.error('Error deleting comment:', error);
            showToast('❌ Ошибка удаления комментария');
          }
        };
        // Start the app
        initApp();
    </script>
</body>
</html>
