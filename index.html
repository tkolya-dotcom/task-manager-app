                        <div class="stat-label">Проектов</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${taskCount}</div>
                        <div class="stat-label">Задач</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${installationCount}</div>
                        <div class="stat-label">Монтажей</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${completedTasks + completedInstallations}</div>
                        <div class="stat-label">Выполнено</div>
                    </div>
                </div>
            `;
            
            // Simple progress visualization
            const totalItems = taskCount + installationCount;
            const completedItems = completedTasks + completedInstallations;
            const progress = totalItems > 0 ? Math.round((completedItems / totalItems) * 100) : 0;
            
            html += `
                <div class="card">
                    <h3 class="section-title">Общий прогресс</h3>
                    <div style="background: var(--secondary); height: 20px; border-radius: 10px; overflow: hidden; margin-bottom: 8px;">
                        <div style="background: linear-gradient(90deg, var(--accent), var(--accent2)); height: 100%; width: ${progress}%; transition: width 0.3s ease;"></div>
                    </div>
                    <p style="text-align: center; color: var(--text-muted)">${progress}% выполнено</p>
                </div>
            `;
            
            // Status breakdown
            const taskStatuses = {};
            tasks.data?.forEach(t => {
                taskStatuses[t.status] = (taskStatuses[t.status] || 0) + 1;
            });
            
            const instStatuses = {};
            installations.data?.forEach(i => {
                instStatuses[i.status] = (instStatuses[i.status] || 0) + 1;
            });
            
            html += `
                <div class="card">
                    <h3 class="section-title">Статусы задач</h3>
                    ${Object.entries(taskStatuses).map(([status, count]) => `
                        <div class="item-row">
                            <span>${getStatusLabel(status)}</span>
                            <span class="status status-${status}">${count}</span>
                        </div>
                    `).join('')}
                </div>
                
                <div class="card">
                    <h3 class="section-title">Статусы монтажей</h3>
                    ${Object.entries(instStatuses).map(([status, count]) => `
                        <div class="item-row">
                            <span>${getStatusLabel(status)}</span>
                            <span class="status status-${status}">${count}</span>
                        </div>
                    `).join('')}
                </div>
            `;
            
            content.innerHTML = html;
        }

        // ============================================================
        // EVENT LISTENERS
        // ============================================================
        // Auth tabs - using event delegation
        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', function(e) {
                const tabName = this.getAttribute('data-tab');
                if (tabName) {
                    showAuthTab(tabName);
                    // Manually set active class since event.target might be different
                    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                }
            });
        });

        // ============================================================
        // MATRIX RAIN EFFECT
        // ============================================================
        function matrixRain() {
            const canvas = document.getElementById('matrix-canvas');
            const ctx = canvas.getContext('2d');

            // Set canvas size to window size
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // Matrix characters
            const matrix = "アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            const matrixArray = matrix.split("");

            const fontSize = 16;
            const columns = canvas.width / fontSize;
            const drops = [];

            // Initialize drops
            for (let x = 0; x < columns; x++) {
                drops[x] = 1;
            }

            function draw() {
                // Black background with slight transparency for trail effect
                ctx.fillStyle = 'rgba(0, 0, 0, 0.04)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Green text
                ctx.fillStyle = '#00FF88';
                ctx.font = fontSize + 'px monospace';

                // Loop over drops
                for (let i = 0; i < drops.length; i++) {
                    // Random character
                    const text = matrixArray[Math.floor(Math.random() * matrixArray.length)];

                    // Draw the character
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                    // Reset drop to top randomly
                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                        drops[i] = 0;
                    }

                    // Move drop down
                    drops[i]++;
                }
            }

            // Animate
            setInterval(draw, 35);
        }

        // ============================================================
        // INITIALIZATION
        // ============================================================
        // Start the app
        initApp();
        matrixRain();
    </script>
</body>
</html>
