<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0A0A0F">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Планировщик</title>
    <link rel="manifest" href="manifest.json">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Orbitron:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ========================================
           CSS VARIABLES - Cyberpunk/JARVIS/Matrix Theme
           ======================================== */
        :root {
            --primary: #0A0A0F;
            --secondary: #1A1A2E;
            --accent: #00D9FF;
            --accent2: #00FF88;
            --glow: #0080FF;
            --text: #E0E0E0;
            --text-muted: #8892a0;
            --warning: #FF6B00;
            --success: #00FF88;
            --danger: #FF3366;
            --border: rgba(0, 217, 255, 0.15);
            
            /* Gradients */
            --gradient-javis: linear-gradient(135deg, rgba(0, 128, 255, 0.2) 0%, rgba(0, 217, 255, 0.1) 100%);
            --gradient-matrix: linear-gradient(180deg, rgba(0, 255, 136, 0.1) 0%, transparent 100%);
            --gradient-card: linear-gradient(145deg, #1A1A2E 0%, #12121f 100%);
            
            /* Shadows & Glows */
            --glow-cyan: 0 0 20px rgba(0, 217, 255, 0.3), 0 0 40px rgba(0, 217, 255, 0.1);
            --glow-green: 0 0 20px rgba(0, 255, 136, 0.3), 0 0 40px rgba(0, 255, 136, 0.1);
            --glow-blue: 0 0 20px rgba(0, 128, 255, 0.3), 0 0 40px rgba(0, 128, 255, 0.1);
            --shadow-card: 0 4px 20px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        /* ========================================
           BASE STYLES
           ======================================== */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--primary);
            min-height: 100vh;
            font-size: 16px;
            line-height: 1.5;
            color: var(--text);
            background-image: 
                radial-gradient(ellipse at top, rgba(0, 128, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at bottom right, rgba(0, 255, 136, 0.05) 0%, transparent 50%),
                linear-gradient(180deg, #0A0A0F 0%, #0d0d14 100%);
            background-attachment: fixed;
        }

        /* Matrix rain effect - subtle background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 255, 136, 0.015) 2px,
                    rgba(0, 255, 136, 0.015) 4px
                );
            pointer-events: none;
            z-index: 0;
        }

        /* ========================================
           TYPOGRAPHY
           ======================================== */
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
            color: var(--accent);
            text-shadow: 0 0 10px rgba(0, 217, 255, 0.5);
            letter-spacing: 0.5px;
        }

        h1 { font-size: 28px; font-weight: 700; }
        h2 { font-size: 24px; font-weight: 600; }
        h3 { font-size: 20px; font-weight: 500; }

        .title-glow {
            text-shadow: 
                0 0 10px var(--accent),
                0 0 20px var(--accent),
                0 0 40px var(--glow);
        }

        .text-matrix {
            color: var(--accent2);
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        /* ========================================
           LAYOUT
           ======================================== */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
            padding-bottom: 80px;
            position: relative;
            z-index: 1;
        }

        /* ========================================
           HEADER
           ======================================== */
        .header {
            background: linear-gradient(180deg, rgba(26, 26, 46, 0.95) 0%, rgba(26, 26, 46, 0.8) 100%);
            border-bottom: 1px solid var(--border);
            padding: 16px;
            margin: -16px -16px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.5;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
            text-shadow: 0 0 10px rgba(0, 217, 255, 0.5);
        }

        .header-user {
            font-size: 12px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid rgba(255, 51, 102, 0.5);
            color: var(--danger);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: rgba(255, 51, 102, 0.1);
            box-shadow: 0 0 15px rgba(255, 51, 102, 0.3);
            border-color: var(--danger);
        }

        /* ========================================
           CARDS
           ======================================== */
        .card {
            background: var(--gradient-card);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.3;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--glow-cyan);
            border-color: var(--accent);
        }

        .card-clickable {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .card-clickable:active {
            transform: scale(0.98);
        }

        .card h3 {
            font-size: 16px;
            margin-bottom: 8px;
            color: var(--text);
            font-family: 'Orbitron', sans-serif;
            font-weight: 500;
        }

        .card p {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        /* ========================================
           BUTTONS
           ======================================== */
        .btn {
            background: linear-gradient(135deg, var(--accent) 0%, var(--glow) 100%);
            color: var(--primary);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            box-shadow: var(--glow-cyan);
            transform: translateY(-2px);
        }

        .btn:active {
            opacity: 0.9;
            transform: scale(0.98);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--accent2) 0%, #00cc6a 100%);
            color: var(--primary);
        }

        .btn-success:hover {
            box-shadow: var(--glow-green);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger) 0%, #cc0044 100%);
            color: white;
        }

        .btn-danger:hover {
            box-shadow: 0 0 20px rgba(255, 51, 102, 0.4);
        }

        .btn-secondary {
            background: var(--secondary);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            box-shadow: var(--glow-cyan);
        }

        .btn-warning {
            background: linear-gradient(135deg, var(--warning) 0%, #cc5500 100%);
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        .btn-outline:hover {
            background: rgba(0, 217, 255, 0.1);
            box-shadow: var(--glow-cyan);
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 14px;
            width: auto;
            font-family: 'Inter', sans-serif;
        }

        /* ========================================
           FORM ELEMENTS
           ======================================== */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 4px;
            font-size: 14px;
            color: var(--accent);
            font-weight: 500;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 0.5px;
        }

        .form-group input, 
        .form-group select, 
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            background: rgba(10, 10, 15, 0.8);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .form-group input:focus, 
        .form-group select:focus, 
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(0, 217, 255, 0.2), inset 0 0 10px rgba(0, 217, 255, 0.05);
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }

        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }

        /* ========================================
           STATUS BADGES
           ======================================== */
        .status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 1px solid;
        }

        .status-new {
            background: rgba(0, 128, 255, 0.2);
            color: #3399ff;
            border-color: #3399ff;
        }

        .status-planned {
            background: rgba(255, 107, 0, 0.2);
            color: #FF6B00;
            border-color: #FF6B00;
        }

        .status-in_progress {
            background: rgba(0, 217, 255, 0.2);
            color: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(0, 217, 255, 0.2);
        }

        .status-waiting_materials {
            background: rgba(255, 0, 204, 0.2);
            color: #ff00cc;
            border-color: #ff00cc;
        }

        .status-done {
            background: rgba(0, 255, 136, 0.2);
            color: var(--accent2);
            border-color: var(--accent2);
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.2);
        }

        .status-postponed {
            background: rgba(136, 146, 160, 0.2);
            color: var(--text-muted);
            border-color: var(--text-muted);
        }

        .status-draft {
            background: rgba(136, 146, 160, 0.2);
            color: var(--text-muted);
            border-color: var(--text-muted);
        }

        .status-pending {
            background: rgba(255, 107, 0, 0.2);
            color: #FF6B00;
            border-color: #FF6B00;
            animation: pulse 2s infinite;
        }

        .status-approved {
            background: rgba(0, 255, 136, 0.2);
            color: var(--accent2);
            border-color: var(--accent2);
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.2);
        }

        .status-rejected {
            background: rgba(255, 51, 102, 0.2);
            color: var(--danger);
            border-color: var(--danger);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* ========================================
           NAVIGATION
           ======================================== */
        .nav {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            overflow-x: auto;
            padding-bottom: 8px;
            -webkit-overflow-scrolling: touch;
        }

        .nav::-webkit-scrollbar {
            height: 4px;
        }

        .nav::-webkit-scrollbar-track {
            background: var(--secondary);
            border-radius: 2px;
        }

        .nav::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 2px;
        }

        .nav-btn {
            background: var(--secondary);
            border: 1px solid var(--border);
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 13px;
            white-space: nowrap;
            cursor: pointer;
            color: var(--text-muted);
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .nav-btn.active {
            background: linear-gradient(135deg, var(--accent) 0%, var(--glow) 100%);
            color: var(--primary);
            border-color: var(--accent);
            font-weight: 600;
            box-shadow: var(--glow-cyan);
        }

        /* ========================================
           LIST ITEMS
           ======================================== */
        .list-item {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            background: var(--secondary);
            border-radius: 8px;
            margin-bottom: 8px;
            transition: all 0.3s ease;
        }

        .list-item:hover {
            background: rgba(0, 217, 255, 0.05);
            border-color: var(--accent);
        }

        .list-item:active {
            background: rgba(0, 217, 255, 0.1);
        }

        .list-item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 4px;
        }

        .list-item-title {
            font-weight: 500;
            color: var(--text);
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
        }

        .list-item-subtitle {
            font-size: 13px;
            color: var(--text-muted);
        }

        /* ========================================
           LOADING
           ======================================== */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .loading-spinner {
            border: 3px solid var(--secondary);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
            box-shadow: 0 0 10px var(--accent);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ========================================
           UTILITIES
           ======================================== */
        .hidden {
            display: none !important;
        }

        /* ========================================
           AUTH SCREEN
           ======================================== */
        .auth-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
            background: 
                radial-gradient(ellipse at top, rgba(0, 128, 255, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at bottom, rgba(0, 255, 136, 0.1) 0%, transparent 50%),
                linear-gradient(180deg, #0A0A0F 0%, #12121f 100%);
            position: relative;
            z-index: 1;
        }

        /* Matrix rain effect for auth */
        .auth-screen::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 255, 136, 0.02) 2px,
                    rgba(0, 255, 136, 0.02) 4px
                );
            pointer-events: none;
        }

        .auth-box {
            background: var(--gradient-card);
            padding: 32px 24px;
            border-radius: 16px;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .auth-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), var(--accent), transparent);
            animation: scanline 3s linear infinite;
        }

        @keyframes scanline {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .auth-box h2 {
            text-align: center;
            margin-bottom: 8px;
            color: var(--accent);
            font-size: 28px;
            text-shadow: 0 0 20px var(--accent);
            font-family: 'Orbitron', sans-serif;
        }

        .auth-box .subtitle {
            text-align: center;
            margin-bottom: 24px;
            color: var(--text-muted);
            font-size: 14px;
            font-family: 'JetBrains Mono', monospace;
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 24px;
            border-bottom: 2px solid var(--border);
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            color: var(--text-muted);
            font-weight: 500;
            transition: all 0.3s ease;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
        }

        .auth-tab:hover {
            color: var(--accent);
        }

        .auth-tab.active {
            border-bottom-color: var(--accent);
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
        }

        .auth-error {
            background: rgba(255, 51, 102, 0.2);
            color: var(--danger);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            border: 1px solid var(--danger);
            font-family: 'JetBrains Mono', monospace;
        }

        /* ========================================
           TABS
           ======================================== */
        .tabs {
            display: flex;
            border-bottom: 2px solid var(--border);
            margin-bottom: 16px;
        }

        .tab {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            font-weight: 500;
            color: var(--text-muted);
            transition: all 0.3s ease;
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
        }

        .tab:hover {
            color: var(--accent);
        }

        .tab.active {
            border-bottom-color: var(--accent);
            color: var(--accent);
        }

        /* ========================================
           MODAL
           ======================================== */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 0;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: var(--gradient-card);
            border-radius: 16px 16px 0 0;
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
            border: 1px solid var(--border);
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.5);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: var(--secondary);
            z-index: 10;
        }

        .modal-header h3 {
            font-size: 18px;
            color: var(--accent);
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-muted);
            padding: 4px;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            color: var(--danger);
            text-shadow: 0 0 10px var(--danger);
        }

        .modal-body {
            padding: 20px;
        }

        /* ========================================
           ACTIONS
           ======================================== */
        .actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .actions .btn {
            flex: 1;
        }

        /* ========================================
           CALENDAR
           ======================================== */
        .calendar {
            background: var(--gradient-card);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: linear-gradient(180deg, var(--secondary) 0%, rgba(26, 26, 46, 0.8) 100%);
            color: var(--accent);
            border-bottom: 1px solid var(--border);
        }

        .calendar-nav {
            background: none;
            border: 1px solid var(--border);
            color: var(--accent);
            font-size: 20px;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .calendar-nav:hover {
            background: rgba(0, 217, 255, 0.1);
            box-shadow: var(--glow-cyan);
        }

        .calendar-month {
            font-size: 16px;
            font-weight: 600;
            font-family: 'Orbitron', sans-serif;
        }

        .calendar-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            background: var(--primary);
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }

        .calendar-weekday {
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
            font-family: 'Orbitron', sans-serif;
        }

        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 4px;
            font-size: 14px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.3s ease;
            color: var(--text);
        }

        .calendar-day:hover {
            background: rgba(0, 217, 255, 0.1);
            border-color: var(--accent);
        }

        .calendar-day.other-month {
            color: var(--text-muted);
            opacity: 0.4;
        }

        .calendar-day.today {
            background: rgba(0, 217, 255, 0.2);
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(0, 217, 255, 0.3);
            font-weight: 600;
        }

        .calendar-day.has-items {
            background: rgba(0, 255, 136, 0.1);
            border-color: rgba(0, 255, 136, 0.3);
        }

        .calendar-day-items {
            font-size: 9px;
            color: var(--accent2);
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-family: 'JetBrains Mono', monospace;
        }

        .calendar-item {
            padding: 10px 12px;
            margin-bottom: 8px;
            background: var(--secondary);
            border-radius: 8px;
            border-left: 3px solid var(--accent);
        }

        .calendar-item.installation {
            border-left-color: var(--accent2);
        }

        .calendar-item-time {
            font-size: 12px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        /* ========================================
           BOTTOM NAV
           ======================================== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(180deg, rgba(26, 26, 46, 0.95) 0%, rgba(26, 26, 46, 0.9) 100%);
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            border-top: 1px solid var(--border);
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .bottom-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px 16px;
            color: var(--text-muted);
            font-size: 11px;
            cursor: pointer;
            background: none;
            border: none;
            transition: all 0.3s ease;
        }

        .bottom-nav-item:hover,
        .bottom-nav-item.active {
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
        }

        .bottom-nav-icon {
            font-size: 20px;
            margin-bottom: 2px;
        }

        /* ========================================
           STATS
           ======================================== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: var(--gradient-card);
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--glow-cyan);
            border-color: var(--accent);
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 10px var(--accent);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ========================================
           DETAIL VIEW
           ======================================== */
        .detail-header {
            margin-bottom: 16px;
        }

        .detail-title {
            font-size: 22px;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 8px;
            font-family: 'Orbitron', sans-serif;
        }

        .detail-meta {
            font-size: 14px;
            color: var(--text-muted);
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--accent);
            font-family: 'Orbitron', sans-serif;
        }

        /* ========================================
           PR ITEMS
           ======================================== */
        .pr-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 12px;
            background: var(--secondary);
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .pr-item:hover {
            border-color: var(--accent);
        }

        .pr-item-name {
            font-weight: 500;
            color: var(--text);
        }

        .pr-item-qty {
            color: var(--accent);
            font-size: 14px;
            font-family: 'JetBrains Mono', monospace;
        }

        /* ========================================
           EMPTY STATE
           ======================================== */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            filter: grayscale(0.5);
        }

        /* ========================================
           TOAST
           ======================================== */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--secondary);
            color: var(--text);
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 2000;
            animation: fadeIn 0.3s ease;
            border: 1px solid var(--accent);
            box-shadow: var(--glow-cyan);
            font-family: 'JetBrains Mono', monospace;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* ========================================
           CHOICES & BADGES
           ======================================== */
        .choices-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }

        .note-badge {
            display: inline-flex;
            align-items: center;
            background: var(--secondary);
            border-radius: 16px;
            padding: 4px 8px;
            font-size: 12px;
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .note-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            margin-right: 6px;
            flex-shrink: 0;
            box-shadow: 0 0 8px var(--accent);
        }

        .note-text {
            font-weight: 500;
        }

        /* ========================================
           ITEM ROW
           ======================================== */
        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .item-row:last-child {
            border-bottom: none;
        }

        /* ========================================
           SCROLLBAR
           ======================================== */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent2);
        }

        /* ========================================
           GLITCH EFFECT (for headings)
           ======================================== */
        .glitch {
            position: relative;
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0%, 90%, 100% { text-shadow: 0 0 10px var(--accent); }
            92% { text-shadow: -2px 0 var(--danger), 2px 0 var(--accent2); }
            94% { text-shadow: 2px 0 var(--accent), -2px 0 var(--accent2); }
        }

        /* ========================================
           RESPONSIVE
           ======================================== */
        @media (max-width: 480px) {
            h1 { font-size: 24px; }
            h2 { font-size: 20px; }
            h3 { font-size: 18px; }
            
            .auth-box {
                padding: 24px 16px;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Auth Screen -->
    <div id="authScreen" class="auth-screen">
        <div class="auth-box">
            <h2 class="glitch">ПЛАНИРОВЩИК</h2>
            <p class="subtitle">> Управление задачами и монтажами_</p>
            
            <div class="auth-tabs">
                <div class="auth-tab active" data-tab="login">ВХОД</div>
                <div class="auth-tab" data-tab="register">РЕГИСТРАЦИЯ</div>
            </div>
            
            <div id="authError" class="auth-error hidden"></div>
            
            <!-- Login Form -->
            <div id="loginForm">
                <div class="form-group">
                    <label>EMAIL</label>
                    <input type="email" id="loginEmail" placeholder="email@example.com">
                </div>
                <div class="form-group">
                    <label>ПАРОЛЬ</label>
                    <input type="password" id="loginPassword" placeholder="********">
                </div>
                <button class="btn" onclick="login()">ВОЙТИ</button>
            </div>
            
            <!-- Register Form -->
            <div id="registerForm" class="hidden">
                <div class="form-group">
                    <label>ИМЯ</label>
                    <input type="text" id="registerName" placeholder="Ваше имя">
                </div>
                <div class="form-group">
                    <label>EMAIL</label>
                    <input type="email" id="registerEmail" placeholder="email@example.com">
                </div>
                <div class="form-group">
                    <label>РОЛЬ</label>
                    <select id="registerRole">
                        <option value="worker">Исполнитель</option>
                        <option value="manager">Руководитель</option>
                        <option value="deputy_head">Зам начальника отдела</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>ПАРОЛЬ</label>
                    <input type="password" id="registerPassword" placeholder="********">
                </div>
                <button class="btn" onclick="register()">ЗАРЕГИСТРИРОВАТЬСЯ</button>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="container hidden">
        <div class="header">
            <div>
                <h1 id="headerTitle" class="title-glow">Планировщик</h1>
                <div id="headerUser" class="header-user"></div>
            </div>
            <button class="logout-btn" onclick="logout()">Выход</button>
        </div>
        
        <!-- Navigation -->
        <div class="nav" id="nav"></div>
        
        <!-- Content -->
        <div id="content"></div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Заголовок</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div id="modalBody" class="modal-body"></div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast hidden"></div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script type="module">
        // ============================================================
        // CONFIGURATION - Replace with your Supabase credentials
        // ============================================================
        const SUPABASE_URL = 'https://jmxjbdnqnzkzxgsfywha.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpteGpiZG5xbnprenhnc2Z5d2hhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExNTQ0MzQsImV4cCI6MjA4NjczMDQzNH0.z6y6DGs9Z6kojQYeAdsgKA-m4pxuoeABdY4rAojPEE4';
        
        // JWT token helper function
        function getAuthHeaders() {
            const token = localStorage.getItem('token');
            return {
                'Content-Type': 'application/json',
                ...(token ? { 'Authorization': `Bearer ${token}` } : {})
            };
        }
        
        // Initialize Supabase client (kept for potential fallback usage)
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // ============================================================
        // STATE
        // ============================================================
        let currentUser = null;
        let currentUserProfile = null;
        let currentView = 'dashboard';
        let currentProjectId = null;
        
        // Purchase request state
        let prType = null;
        let prRefId = null;
        
        // Calendar state
        let calendarDate = new Date();
        
        // Filter state
        let taskStatusFilter = 'all';
        let installationStatusFilter = 'all';
        let prStatusFilter = 'all';
        
        // Helper function to check if user has elevated privileges (manager or deputy_head)
        function isElevatedUser() {
            return currentUserProfile?.role === 'manager' || currentUserProfile?.role === 'deputy_head';
        }
        
        // ============================================================
        // AUTH FUNCTIONS
        // ============================================================
        window.showAuthTab = function(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'login') {
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('registerForm').classList.add('hidden');
            } else {
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('registerForm').classList.remove('hidden');
            }
            hideAuthError();
        };
        
        window.login = async function() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showAuthError('Заполните все поля');
                return;
            }
            
            try {
                // Use Supabase Auth directly
                const { data: authData, error: authError } = await supabase.auth.signInWithPassword({
                    email,
                    password
                });
                
                if (authError) {
                    // Handle specific error cases
                    if (authError.message && (authError.message.includes('user_already_exists') || authError.message.includes('already been registered'))) {
                        throw new Error('Пользователь с таким email уже существует. Попробуйте войти или используйте другой email.');
                    }
                    throw new Error(authError.message);
                }
                
                // Store the session
                localStorage.setItem('token', authData.session.access_token);
                localStorage.setItem('supabase_session', JSON.stringify(authData.session));
                
                // Get user profile from users table
                const { data: userData, error: userError } = await supabase
                    .from('users')
                    .select('*')
                    .eq('id', authData.user.id)
                    .single();
                
                if (userError && userError.code !== 'PGRST116') {
                    console.error('Error fetching user profile:', userError);
                }
                
                // Set the current user profile
                currentUser = { id: authData.user.id, email: authData.user.email };
                currentUserProfile = userData && userData.role ? userData : { 
                    id: authData.user.id, 
                    email: authData.user.email, 
                    name: authData.user.email.split('@')[0],
                    role: 'worker'
                };
                
                showApp();
            } catch (error) {
                showAuthError(error.message);
            }
        };
        
        window.register = async function() {
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const role = document.getElementById('registerRole').value;
            const password = document.getElementById('registerPassword').value;

            if (!name || !email || !password) {
                showAuthError('Заполните все поля');
                return;
            }

            if (password.length < 6) {
                showAuthError('Пароль должен быть минимум 6 символов');
                return;
            }

            try {
                // Create user with Supabase Auth
                const { data: authData, error: authError } = await supabase.auth.signUp({
                    email,
                    password
                });

                if (authError) {
                    console.error('Auth signup error:', authError);
                    
                    if (authError.message && authError.message.includes('already been registered')) {
                        throw new Error('Пользователь с таким email уже существует. Попробуйте войти.');
                    }
                    if (authError.message && authError.message.includes('rate limit')) {
                        throw new Error('Слишком много попыток. Попробуйте позже.');
                    }
                    throw new Error(authError.message || 'Ошибка регистрации');
                }

                if (!authData || !authData.user) {
                    if (authData && authData.session) {
                        // Continue with session
                    } else {
                        // Try to sign in directly (might already exist)
                        const { data: signInData, error: signInError } = await supabase.auth.signInWithPassword({
                            email,
                            password
                        });
                        
                        if (signInError) {
                            throw new Error('Не удалось создать пользователя. Попробуйте позже или свяжитесь с администратором.');
                        }
                        
                        authData = signInData;
                    }
                }

                // Try to create user profile in users table
                try {
                    const { error: profileError } = await supabase
                        .from('users')
                        .insert([{
                            id: authData.user.id,
                            email,
                            name,
                            role
                        }]);

                    if (profileError) {
                        console.log('Profile creation note:', profileError.message);
                    }
                } catch (profileCatch) {
                    console.log('Profile creation skipped:', profileCatch.message);
                }

                // Store the session
                localStorage.setItem('token', authData.session.access_token);
                localStorage.setItem('supabase_session', JSON.stringify(authData.session));

                // Set the current user profile
                currentUser = { id: authData.user.id, email: authData.user.email };
                currentUserProfile = {
                    id: authData.user.id,
                    email: authData.user.email,
                    name,
                    role
                };

                showToast('Регистрация успешна!');
                showApp();
            } catch (error) {
                console.error('Registration error:', error);
                showAuthError(error.message || 'Ошибка регистрации. Попробуйте позже.');
            }
        };
        
        window.logout = async function() {
            // Clear the JWT token from localStorage
            localStorage.removeItem('token');
            currentUser = null;
            currentUserProfile = null;
            showLogin();
        };
        
        async function loadCurrentUserProfile() {
            const token = localStorage.getItem('token');

            if (!token) {
                currentUser = null;
                currentUserProfile = null;
                return;
            }

            try {
                // Get user from Supabase using the token
                const { data: { user }, error: userError } = await supabase.auth.getUser(token);

                if (userError) {
                    console.error('Error loading user:', userError);
                    currentUser = null;
                    currentUserProfile = null;
                    localStorage.removeItem('token');
                    return;
                }

                // Get user profile from users table
                const { data: userData, error: profileError } = await supabase
                    .from('users')
                    .select('*')
                    .eq('id', user.id)
                    .single();

                if (profileError && profileError.code !== 'PGRST116') {
                    console.error('Error fetching user profile:', profileError);
                }

                currentUser = { id: user.id, email: user.email };
                currentUserProfile = userData && userData.role ? userData : {
                    id: user.id,
                    email: user.email,
                    name: user.email.split('@')[0],
                    role: 'worker'
                };
            } catch (error) {
                console.error('Error loading user profile:', error);
                currentUser = null;
                currentUserProfile = null;
                localStorage.removeItem('token');
            }
        }
        
        function showAuthError(message) {
            const el = document.getElementById('authError');
            el.textContent = message;
            el.classList.remove('hidden');
        }
        
        function hideAuthError() {
            document.getElementById('authError').classList.add('hidden');
        }
        
        function showLogin() {
            document.getElementById('authScreen').classList.remove('hidden');
            document.getElementById('app').classList.add('hidden');
        }
        
        function showApp() {
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            
            const roleLabel = currentUserProfile?.role === 'manager' ? 'Руководитель' : (currentUserProfile?.role === 'deputy_head' ? 'Зам начальника отдела' : (currentUserProfile?.role === 'worker' ? 'Исполнитель' : 'Исполнитель'));
            document.getElementById('headerTitle').textContent = currentUserProfile?.name || 'Пользователь';
            document.getElementById('headerUser').textContent = '> ' + roleLabel;
            
            renderNav();
            renderContent();
        }
        
        // Check auth state on load
        async function initApp() {
            const token = localStorage.getItem('token');
            
            if (token) {
                await loadCurrentUserProfile();
                // Check if user profile was loaded successfully
                if (currentUserProfile) {
                    showApp();
                } else {
                    showLogin();
                }
            } else {
                showLogin();
            }
        }
        
        // ============================================================
        // NAVIGATION
        // ============================================================
        window.navigate = function(view) {
            currentView = view;
            currentProjectId = null;
            renderNav();
            renderContent();
        };
        
        function renderNav() {
            const nav = document.getElementById('nav');
            const isManager = isElevatedUser();

            const buttons = [
                { id: 'dashboard', label: 'Главная', icon: '⌂' },
                { id: 'projects', label: 'Проекты', icon: '▣' },
                { id: 'tasks', label: 'Задачи', icon: '☰' },
                { id: 'installations', label: 'Монтажи', icon: '⚙' },
                { id: 'calendar', label: 'Календарь', icon: '▦' },
                { id: 'scheme', label: 'Схема', icon: '◫' }
            ];

            // Show "Заявки" tab for all users
            buttons.push({ id: 'purchaseRequests', label: 'Заявки', icon: '▤' });

            nav.innerHTML = buttons.map(btn =>
                `<button class="nav-btn ${currentView === btn.id ? 'active' : ''}" onclick="navigate('${btn.id}')">${btn.icon} ${btn.label}</button>`
            ).join('');
        }
        
        // ============================================================
        // CONTENT RENDERING
        // ============================================================
        async function renderContent() {
            const content = document.getElementById('content');
            content.innerHTML = '<div class="loading"><div class="loading-spinner"></div>Загрузка...</div>';
            
            try {
                switch(currentView) {
                    case 'dashboard':
                        await renderDashboard(content);
                        break;
                    case 'projects':
                        await renderProjects(content);
                        break;
                    case 'tasks':
                        await renderTasks(content);
                        break;
                    case 'installations':
                        await renderInstallations(content);
                        break;
                    case 'purchaseRequests':
                        await renderPurchaseRequests(content);
                        break;
                    case 'calendar':
                        await renderCalendar(content);
                        break;
                    case 'scheme':
                        await renderScheme(content);
                        break;
                    default:
                        await renderDashboard(content);
                }
            } catch (error) {
                console.error('Render error:', error);
                content.innerHTML = `<div class="card"><p style="color: var(--danger)">Ошибка: ${error.message}</p></div>`;
            }
        }
        
        // ============================================================
        // DASHBOARD
        // ============================================================
        async function renderDashboard(content) {
            const isManager = isElevatedUser();
            
            let html = '<h2 style="margin-bottom: 16px">Главная</h2>';
            
            // Stats
            const [projects, tasks, installations, prs] = await Promise.all([
                isManager ? getProjects() : getMyProjects(),
                isManager ? getTasks() : getMyTasks(),
                isManager ? getInstallations() : getMyInstallations(),
                getPurchaseRequests()
            ]);
            
            html += `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value">${projects.length}</div>
                        <div class="stat-label">Проектов</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${tasks.length}</div>
                        <div class="stat-label">Задач</div>

        async function getProjects() {
            const { data: projects, error } = await supabase
                .from('projects')
                .select('*')
                .order('created_at', { ascending: false });
            if (error) throw error;
            
            // Get unique creator IDs
            const creatorIds = [...new Set(projects?.map(p => p.created_by).filter(Boolean))];
            
            // Fetch creators if any
            let creators = {};
            if (creatorIds.length > 0) {
                const { data: users } = await supabase
                    .from('users')
                    .select('id, name')
                    .in('id', creatorIds);
                users?.forEach(u => creators[u.id] = u);
            }
            
            // Attach creator names
            return (projects || []).map(p => ({
                ...p,
                users: creators[p.created_by] || null
            }));
        }
        
        async function getMyProjects() {
            const userId = currentUserProfile?.id;

            // Get projects where user has tasks or installations OR is the creator
            const { data: tasks } = await supabase
                .from('tasks')
                .select('project_id')
                .eq('assignee_id', userId);

            const { data: installations } = await supabase
                .from('installations')
                .select('project_id')
                .eq('assignee_id', userId);

            const { data: createdProjects } = await supabase
                .from('projects')
                .select('id')
                .eq('created_by', userId);

            const projectIds = new Set([
                ...(tasks || []).map(t => t.project_id),
                ...(installations || []).map(i => i.project_id),
                ...(createdProjects || []).map(p => p.id)
            ]);

            if (projectIds.size === 0) return [];

            const { data: projects, error } = await supabase
                .from('projects')
                .select('*')
                .in('id', Array.from(projectIds))
                .order('created_at', { ascending: false });

            if (error) throw error;
            
            const creatorIds = [...new Set(projects?.map(p => p.created_by).filter(Boolean))];
            
            let creators = {};
            if (creatorIds.length > 0) {
                const { data: users } = await supabase
                    .from('users')
                    .select('id, name')
                    .in('id', creatorIds);
                users?.forEach(u => creators[u.id] = u);
            }
            
            return (projects || []).map(p => ({
                ...p,
                users: creators[p.created_by] || null
            }));
        }

        async function showProjectDetail(projectId) {
            const { data: project } = await supabase
                .from('projects')
                .select('*')
                .eq('id', projectId)
                .single();

            if (!project) return;

            let creatorName = 'Unknown';
            if (project.created_by) {
                const { data: creator } = await supabase
                    .from('users')
                    .select('name')
                    .eq('id', project.created_by)
                    .single();
                creatorName = creator?.name || 'Unknown';
            }

            const { data: tasks } = await supabase
                .from('tasks')
                .select('*')
                .eq('project_id', projectId)
                .order('created_at', { ascending: false });

            const { data: installations } = await supabase
                .from('installations')
                .select('*')
                .eq('project_id', projectId)
                .order('scheduled_at', { ascending: true });

            const allUserIds = new Set();
            tasks?.forEach(t => t.assignee_id && allUserIds.add(t.assignee_id));
            installations?.forEach(i => i.assignee_id && allUserIds.add(i.assignee_id));

            let usersMap = {};
            if (allUserIds.size > 0) {
                const { data: users } = await supabase
                    .from('users')
                    .select('id, name')
                    .in('id', Array.from(allUserIds));
                users?.forEach(u => usersMap[u.id] = u);
            }

            const tasksWithDetails = (tasks || []).map(t => ({
                ...t,
                users: usersMap[t.assignee_id] || null,
                projects: { name: project.name }
            }));

            const installationsWithDetails = (installations || []).map(i => ({
                ...i,
                users: usersMap[i.assignee_id] || null,
                projects: { name: project.name }
            }));

            let html = `
                <button class="btn btn-outline btn-sm" onclick="navigate('projects')" style="margin-bottom: 16px">← Назад</button>
                <div class="detail-header">
                    <div class="detail-title">${project.name}</div>
                    <div class="detail-meta">${project.description || ''}</div>
                    <div class="detail-meta">Создал: ${creatorName}</div>
                </div>
            `;

            if (tasksWithDetails.length > 0) {
                html += `<h3 class="section-title">Задачи (${tasksWithDetails.length})</h3>`;
                tasksWithDetails.forEach(task => {
                    html += renderTaskCard(task, true);
                });
            }

            if (installationsWithDetails.length > 0) {
                html += `<h3 class="section-title">Монтажи (${installationsWithDetails.length})</h3>`;
                installationsWithDetails.forEach(inst => {
                    html += renderInstallationCard(inst, true);
                });
            }

            document.getElementById('content').innerHTML = html;
        }
        
        // ============================================================
        // HELPER: Fetch related data for tasks
        // ============================================================
        async function enrichTasks(tasks) {
            if (!tasks || tasks.length === 0) return [];
            
            const projectIds = [...new Set(tasks.map(t => t.project_id).filter(Boolean))];
            const userIds = [...new Set(tasks.map(t => t.assignee_id).filter(Boolean))];
            
            let projectsMap = {};
            if (projectIds.length > 0) {
                const { data: projects } = await supabase
                    .from('projects')
                    .select('id, name')
                    .in('id', projectIds);
                projects?.forEach(p => projectsMap[p.id] = p);
            }
            
            let usersMap = {};
            if (userIds.length > 0) {
                const { data: users } = await supabase
                    .from('users')
                    .select('id, name')
                    .in('id', userIds);
                users?.forEach(u => usersMap[u.id] = u);
            }
            
            return tasks.map(t => ({
                ...t,
                projects: projectsMap[t.project_id] || null,
                users: usersMap[t.assignee_id] || null
            }));
        }

        function renderTaskCard(task, showProject = false) {
            const isManager = currentUserProfile?.role === 'manager';
            const isWorker = currentUserProfile?.role === 'worker';
            const canEdit = isManager || (isWorker && String(task.assignee_id) === String(currentUserProfile?.id));
            
            return `
                <div class="card card-clickable" onclick="showTaskDetail('${task.id}')">
                    <div class="list-item-header">
                        <div class="list-item-title">${task.title}</div>
                        <span class="status status-${task.status}">${getStatusLabel(task.status)}</span>
                    </div>
                    <div class="list-item-subtitle">
                        ${showProject && task.projects ? task.projects.name + ' - ' : ''}
                        ${task.users?.name || 'Не назначен'}
                    </div>
                    ${canEdit ? `<div style="display:flex;gap:8px;margin-top:8px"><button class="btn btn-sm btn-outline" style="padding:4px 8px;font-size:12px" onclick="event.stopPropagation();showTaskDetail('${task.id}')">✎</button></div>` : ''}
                </div>
            `;

            html += `<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">`;
            const filterOptions = [

            });
            html += `</div>`;

                html += `<button class="btn" onclick="showCreateTaskModal()">+ Новая задача</button><br><br>`;

                });

        async function showTaskDetail(taskId) {
            const { data: task } = await supabase
                .from('tasks')
                .select('*')
                .eq('id', taskId)
                .single();

            if (!task) return;

            let projectName = '-';
            let assigneeName = 'Не назначен';

            if (task.project_id) {
                const { data: project } = await supabase
                    .from('projects')
                    .select('name')
                    .eq('id', task.project_id)
                    .single();
                projectName = project?.name || '-';
            }

            if (task.assignee_id) {
                const { data: user } = await supabase
                    .from('users')
                    .select('name')
                    .eq('id', task.assignee_id)
                    .single();
                assigneeName = user?.name || 'Не назначен';
            }

            const { data: prs } = await supabase
                .from('purchase_requests')
                .select('*')
                .eq('task_id', taskId)
                .order('created_at', { ascending: false });

            const prCreatorIds = [...new Set(prs?.map(pr => pr.created_by).filter(Boolean))];
            let prCreators = {};
            if (prCreatorIds.length > 0) {
                const { data: users } = await supabase
                    .from('users')
                    .select('id, name')
                    .in('id', prCreatorIds);
                users?.forEach(u => prCreators[u.id] = u);
            }

            const prsWithDetails = (prs || []).map(pr => ({
                ...pr,
                users: prCreators[pr.created_by] || null
            }));
            
            const isManager = currentUserProfile?.role === 'manager';
            const isWorker = currentUserProfile?.role === 'worker';
            const canEdit = isManager || (isWorker && String(task.assignee_id) === String(currentUserProfile?.id));
            
            let statusOptions = ['new', 'planned', 'in_progress', 'waiting_materials', 'done', 'postponed']
                .map(s => `<option value="${s}" ${task.status === s ? 'selected' : ''}>${getStatusLabel(s)}</option>`).join('');
            
            let html = `
                <button class="btn btn-outline btn-sm" onclick="navigate('tasks')" style="margin-bottom: 16px">← Назад</button>
                <div class="detail-header">
                    <div class="detail-title">${task.title}</div>
                    <div class="detail-meta">${task.description || ''}</div>
                    <div class="detail-meta">Проект: ${task.projects?.name || '-'}</div>
                    <div class="detail-meta">Исполнитель: ${task.users?.name || 'Не назначен'}</div>
                </div>
            `;
            
            if (canEdit) {
                html += `
                    <div class="card">
                        <h3 class="section-title">Изменить статус</h3>
                        <select id="taskStatus" class="form-group" style="margin-bottom: 12px">
                            ${statusOptions}
                        </select>
                        <button class="btn" onclick="updateTaskStatus('${task.id}')">Сохранить</button>
                    </div>
                `;
            }
            
            if (prs && prs.length > 0) {
                html += `<h3 class="section-title">Заявки на материалы</h3>`;
                prs.forEach(pr => {
                    html += `
                        <div class="card" onclick="showPRDetail('${pr.id}')">
                            <div class="list-item-header">
                                <div class="list-item-title">Заявка #${pr.id.slice(0, 8)}</div>
                                <span class="status status-${pr.status}">${getPRStatusLabel(pr.status)}</span>
                            </div>
                            <div class="list-item-subtitle">${pr.users?.name || ''}</div>
                        </div>
                    `;
                });
            }
            
            const canCreatePR = isElevatedUser() || (String(task.assignee_id) === String(currentUserProfile?.id));
            if (canCreatePR) {
                html += `<button class="btn btn-success" onclick="showCreatePRModal('task', '${task.id}')">Создать заявку на материалы</button>`;
            }
            
            document.getElementById('content').innerHTML = html;
        }
        
        window.updateTaskStatus = async function(taskId) {
            const status = document.getElementById('taskStatus').value;

            try {
                const { error } = await supabase
                    .from('tasks')
                    .update({ status, updated_at: new Date().toISOString() })
                    .eq('id', taskId);

                if (error) throw error;

                showToast('Статус обновлен');
                showTaskDetail(taskId);
            } catch (error) {
                showToast('Ошибка: ' + error.message);
            }
        };

            taskStatusFilter = status;
            renderContent();
        };

            renderInstallations(document.getElementById('content'));
        };
