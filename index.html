<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0A0A0F">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Планировщик</title>
    <link rel="manifest" href="manifest.json">
    <!-- OneSignal Push Notifications -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
        window.OneSignalDeferred = window.OneSignalDeferred || [];
        OneSignalDeferred.push(async function(OneSignal) {
            await OneSignal.init({
                appId: "62869aa0-7f0e-48b7-a2c3-2172de232257",
            });
        });
    </script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Orbitron:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ========================================
           CSS VARIABLES - Cyberpunk/Matrix Theme
           ======================================== */
        :root {
            --primary: #0A0A0F;
            --secondary: #1A1A2E;
            --accent: #00D9FF;
            --accent2: #00FF88;
            --glow: #0080FF;
            --text: #E0E0E0;
            --text-muted: #8892a0;
            --warning: #FF6B00;
            --success: #00FF88;
            --danger: #FF3366;
            --border: rgba(0, 217, 255, 0.15);
            
            /* Gradients */
            --gradient-javis: linear-gradient(135deg, rgba(0, 128, 255, 0.2) 0%, rgba(0, 217, 255, 0.1) 100%);
            --gradient-matrix: linear-gradient(180deg, rgba(0, 255, 136, 0.1) 0%, transparent 100%);
            --gradient-card: linear-gradient(145deg, #1A1A2E 0%, #12121f 100%);
            
            /* Shadows & Glows */
            --glow-cyan: 0 0 20px rgba(0, 217, 255, 0.3), 0 0 40px rgba(0, 217, 255, 0.1);
            --glow-green: 0 0 20px rgba(0, 255, 136, 0.3), 0 0 40px rgba(0, 255, 136, 0.1);
            --glow-blue: 0 0 20px rgba(0, 128, 255, 0.3), 0 0 40px rgba(0, 128, 255, 0.1);
            --shadow-card: 0 4px 20px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        /* ========================================
           BASE STYLES
           ======================================== */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--primary);
            min-height: 100vh;
            font-size: 16px;
            line-height: 1.5;
            color: var(--text);
            background-image: 
                radial-gradient(ellipse at top, rgba(0, 128, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at bottom right, rgba(0, 255, 136, 0.05) 0%, transparent 50%),
                linear-gradient(180deg, #0A0A0F 0%, #0d0d14 100%);
            background-attachment: fixed;
        }



        /* ========================================
           TYPOGRAPHY
           ======================================== */
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
            color: var(--accent);
            text-shadow: 0 0 10px rgba(0, 217, 255, 0.5);
            letter-spacing: 0.5px;
        }

        h1 { font-size: 28px; font-weight: 700; }
        h2 { font-size: 24px; font-weight: 600; }
        h3 { font-size: 20px; font-weight: 500; }

        .title-glow {
            text-shadow: 
                0 0 10px var(--accent),
                0 0 20px var(--accent),
                0 0 40px var(--glow);
        }

        .text-matrix {
            color: var(--accent2);
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        /* ========================================
           LAYOUT
           ======================================== */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
            padding-bottom: 80px;
            position: relative;
            z-index: 1;
        }

        /* ========================================
           HEADER
           ======================================== */
        .header {
            background: linear-gradient(180deg, rgba(26, 26, 46, 0.95) 0%, rgba(26, 26, 46, 0.8) 100%);
            border-bottom: 1px solid var(--border);
            padding: 16px;
            margin: -16px -16px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.5;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
            text-shadow: 0 0 10px rgba(0, 217, 255, 0.5);
        }

        .header-user {
            font-size: 12px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid rgba(255, 51, 102, 0.5);
            color: var(--danger);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: rgba(255, 51, 102, 0.1);
            box-shadow: 0 0 15px rgba(255, 51, 102, 0.3);
            border-color: var(--danger);
        }

        /* ========================================
           CARDS
           ======================================== */
        .card {
            background: var(--gradient-card);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.3;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--glow-cyan);
            border-color: var(--accent);
        }

        .card-clickable {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .card-clickable:active {
            transform: scale(0.98);
        }

        .card h3 {
            font-size: 16px;
            margin-bottom: 8px;
            color: var(--text);
            font-family: 'Orbitron', sans-serif;
            font-weight: 500;
        }

        .card p {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        /* ========================================
           BUTTONS
           ======================================== */
        .btn {
            background: linear-gradient(135deg, var(--accent) 0%, var(--glow) 100%);
            color: var(--primary);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            box-shadow: var(--glow-cyan);
            transform: translateY(-2px);
        }

        .btn:active {
            opacity: 0.9;
            transform: scale(0.98);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--accent2) 0%, #00cc6a 100%);
            color: var(--primary);
        }

        .btn-success:hover {
            box-shadow: var(--glow-green);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger) 0%, #cc0044 100%);
            color: white;
        }

        .btn-danger:hover {
            box-shadow: 0 0 20px rgba(255, 51, 102, 0.4);
        }

        .btn-secondary {
            background: var(--secondary);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            box-shadow: var(--glow-cyan);
        }

        .btn-warning {
            background: linear-gradient(135deg, var(--warning) 0%, #cc5500 100%);
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        .btn-outline:hover {
            background: rgba(0, 217, 255, 0.1);
            box-shadow: var(--glow-cyan);
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 14px;
            width: auto;
            font-family: 'Inter', sans-serif;
        }

        /* ========================================
           FORM ELEMENTS
           ======================================== */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 4px;
            font-size: 14px;
            color: var(--accent);
            font-weight: 500;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 0.5px;
        }

        .form-group input, 
        .form-group select, 
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            background: rgba(10, 10, 15, 0.8);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .form-group input:focus, 
        .form-group select:focus, 
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(0, 217, 255, 0.2), inset 0 0 10px rgba(0, 217, 255, 0.05);
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }

        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }

        /* ========================================
           STATUS BADGES
           ======================================== */
        .status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 1px solid;
        }

        .status-new {
            background: rgba(0, 128, 255, 0.2);
            color: #3399ff;
            border-color: #3399ff;
        }

        .status-planned {
            background: rgba(255, 107, 0, 0.2);
            color: #FF6B00;
            border-color: #FF6B00;
        }

        .status-in_progress {
            background: rgba(0, 217, 255, 0.2);
            color: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(0, 217, 255, 0.2);
        }

        .status-waiting_materials {
            background: rgba(255, 0, 204, 0.2);
            color: #ff00cc;
            border-color: #ff00cc;
        }

        .status-done {
            background: rgba(0, 255, 136, 0.2);
            color: var(--accent2);
            border-color: var(--accent2);
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.2);
        }

        .status-postponed {
            background: rgba(136, 146, 160, 0.2);
            color: var(--text-muted);
            border-color: var(--text-muted);
        }

        /* Overdue animation */
        @keyframes blink-red {
            0%, 100% { 
                background: var(--gradient-card);
                border-color: var(--danger);
                box-shadow: 0 0 10px rgba(255, 51, 102, 0.3);
            }
            50% { 
                background: rgba(255, 51, 102, 0.15);
                border-color: var(--danger);
                box-shadow: 0 0 20px rgba(255, 51, 102, 0.5);
            }
        }

        .overdue {
            animation: blink-red 1.5s ease-in-out infinite;
            border: 2px solid var(--danger) !important;
        }

        .overdue .list-item-title {
            color: var(--danger);
        }

        .status-draft {
            background: rgba(136, 146, 160, 0.2);
            color: var(--text-muted);
            border-color: var(--text-muted);
        }

        .status-pending {
            background: rgba(255, 107, 0, 0.2);
            color: #FF6B00;
            border-color: #FF6B00;
            animation: pulse 2s infinite;
        }

        .status-approved {
            background: rgba(0, 255, 136, 0.2);
            color: var(--accent2);
            border-color: var(--accent2);
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.2);
        }

        .status-rejected {
            background: rgba(255, 51, 102, 0.2);
            color: var(--danger);
            border-color: var(--danger);
        }

        .status-in_order {
            background: rgba(0, 128, 255, 0.2);
            color: #3399ff;
            border-color: #3399ff;
        }

        .status-ready_for_receipt {
            background: rgba(255, 165, 0, 0.2);
            color: #FFA500;
            border-color: #FFA500;
        }

        .status-received {
            background: rgba(138, 43, 226, 0.2);
            color: #8A2BE2;
            border-color: #8A2BE2;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* ========================================
           NAVIGATION
           ======================================== */
        .nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
            justify-content: center;
            padding-bottom: 8px;
        }

        .nav::-webkit-scrollbar {
            height: 4px;
        }

        .nav::-webkit-scrollbar-track {
            background: var(--secondary);
            border-radius: 2px;
        }

        .nav::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 2px;
        }

        .nav-btn {
            background: var(--secondary);
            border: 1px solid var(--border);
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 13px;
            white-space: nowrap;
            cursor: pointer;
            color: var(--text-muted);
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            flex: 1 1 auto;
            min-width: 80px;
            max-width: 150px;
            text-align: center;
        }

        .nav-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .nav-btn.active {
            background: linear-gradient(135deg, var(--accent) 0%, var(--glow) 100%);
            color: var(--primary);
            border-color: var(--accent);
            font-weight: 600;
            box-shadow: var(--glow-cyan);
        }

        /* ========================================
           LIST ITEMS
           ======================================== */
        .list-item {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            background: var(--secondary);
            border-radius: 8px;
            margin-bottom: 8px;
            transition: all 0.3s ease;
        }

        .list-item:hover {
            background: rgba(0, 217, 255, 0.05);
            border-color: var(--accent);
        }

        .list-item:active {
            background: rgba(0, 217, 255, 0.1);
        }

        .list-item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 4px;
        }

        .list-item-title {
            font-weight: 500;
            color: var(--text);
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
        }

        .list-item-subtitle {
            font-size: 13px;
            color: var(--text-muted);
        }

        /* ========================================
           LOADING
           ======================================== */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .loading-spinner {
            border: 3px solid var(--secondary);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
            box-shadow: 0 0 10px var(--accent);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ========================================
           UTILITIES
           ======================================== */
        .hidden {
            display: none !important;
        }

        /* ========================================
           SWIPE TO DELETE
           ======================================== */
        .swipeable-item {
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .swipe-actions {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            background: linear-gradient(90deg, transparent, var(--danger));
            padding-right: 16px;
        }

        .swipe-actions.show {
            transform: translateX(0);
        }

        .swipe-delete-btn {
            background: var(--danger);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        .swipe-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            display: none;
        }

        .swipe-overlay.show {
            display: block;
        }

        /* ========================================
           AUTH SCREEN
           ======================================== */
        .auth-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
            background: 
                radial-gradient(ellipse at top, rgba(0, 128, 255, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at bottom, rgba(0, 255, 136, 0.1) 0%, transparent 50%),
                linear-gradient(180deg, #0A0A0F 0%, #12121f 100%);
            position: relative;
            z-index: 1;
        }

        /* Matrix rain effect for auth */
        .auth-screen::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 255, 136, 0.02) 2px,
                    rgba(0, 255, 136, 0.02) 4px
                );
            pointer-events: none;
        }

        .auth-box {
            background: var(--gradient-card);
            padding: 32px 24px;
            border-radius: 16px;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .auth-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), var(--accent), transparent);
            animation: scanline 3s linear infinite;
        }

        @keyframes scanline {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .auth-box h2 {
            text-align: center;
            margin-bottom: 8px;
            color: var(--accent);
            font-size: 28px;
            text-shadow: 0 0 20px var(--accent);
            font-family: 'Orbitron', sans-serif;
        }

        .auth-box .subtitle {
            text-align: center;
            margin-bottom: 24px;
            color: var(--text-muted);
            font-size: 14px;
            font-family: 'JetBrains Mono', monospace;
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 24px;
            border-bottom: 2px solid var(--border);
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            color: var(--text-muted);
            font-weight: 500;
            transition: all 0.3s ease;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
        }

        .auth-tab:hover {
            color: var(--accent);
        }

        .auth-tab.active {
            border-bottom-color: var(--accent);
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
        }

        .auth-error {
            background: rgba(255, 51, 102, 0.2);
            color: var(--danger);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            border: 1px solid var(--danger);
            font-family: 'JetBrains Mono', monospace;
        }

        /* ========================================
           TABS
           ======================================== */
        .tabs {
            display: flex;
            border-bottom: 2px solid var(--border);
            margin-bottom: 16px;
        }

        .tab {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            font-weight: 500;
            color: var(--text-muted);
            transition: all 0.3s ease;
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
        }

        .tab:hover {
            color: var(--accent);
        }

        .tab.active {
            border-bottom-color: var(--accent);
            color: var(--accent);
        }

        /* ========================================
           MODAL
           ======================================== */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 0;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: var(--gradient-card);
            border-radius: 16px 16px 0 0;
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
            border: 1px solid var(--border);
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.5);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: var(--secondary);
            z-index: 10;
        }

        .modal-header h3 {
            font-size: 18px;
            color: var(--accent);
        }

        .modal-close {
            background: none;
            border: none;

        /* ========================================

            0%, 90%, 100% { text-shadow: 0 0 10px var(--accent); }

            94% { text-shadow: 2px 0 var(--accent), -2px 0 var(--accent2); }

        /* ========================================
           RESPONSIVE
           ======================================== */
        @media (max-width: 480px) {
            h1 { font-size: 24px; }

            .auth-box {
                padding: 24px 16px;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }

    </style>
</head>
<body>

    <script type="module">
        // ============================================================

        const SUPABASE_URL = 'https://jmxjbdnqnzkzxgsfywha.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpteGpiZG5xbnprenhnc2Z5d2hhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExNTQ0MzQsImV4cCI6MjA4NjczMDQzNH0.z6y6DGs9Z6kojQYeAdsgKA-m4pxuoeABdY4rAojPEE4';
        
        // JWT token helper function

        // ============================================================

        // ============================================================
        
        // Request notification permission and store subscription
        async function initNotifications() {
            if (!('Notification' in window)) {
                console.log('This browser does not support notifications');
                return;
            }
            
            // Request permission
            if (Notification.permission === 'default') {
                const permission = await Notification.requestPermission();
                if (permission === 'granted') {
                    console.log('Notification permission granted');
                    await saveNotificationPermission(permission);
                    await registerServiceWorkerAndSubscribe();
                    await initOneSignal();
                }
            } else if (Notification.permission === 'granted') {
                console.log('Notifications already enabled');
                await saveNotificationPermission('granted');
                await registerServiceWorkerAndSubscribe();
                await initOneSignal();
            }
        }
        
        // Initialize OneSignal and save external user ID
        async function initOneSignal() {
            if (!window.OneSignalDeferred) {
                console.log('OneSignal not loaded');
                return;
            }
            
            try {
                OneSignalDeferred.push(async function(OneSignal) {
                    // Wait for OneSignal to be ready
                    await OneSignal.ready;
                    
                    // Get OneSignal subscription ID
                    const subscription = await OneSignal.User.PushSubscription.getIdAsync();
                    
                    if (subscription && currentUserProfile?.id) {
                        // Save to database
                        const { error } = await supabase
                            .from('users')
                            .update({ onesignal_external_id: subscription })
                            .eq('id', currentUserProfile.id);
                        
                        if (error) {
                            console.error('Error saving OneSignal ID:', error);
                        } else {
                            console.log('OneSignal ID saved:', subscription);
                        }
                    }
                });
            } catch (error) {
                console.error('Error initializing OneSignal:', error);
            }
        }
        
        // Register service worker and subscribe to push notifications
        async function registerServiceWorkerAndSubscribe() {
            try {
                // Register service worker
                const registration = await navigator.serviceWorker.register('/service-worker.js');
                console.log('Service Worker registered:', registration);
                
                // Subscribe to push notifications
                const subscription = await registration.pushManager.subscribe({
                    userVisibleOnly: true,
                    applicationServerKey: urlBase64ToUint8Array('YOUR_VAPID_PUBLIC_KEY_HERE')
                });
                
                // Save subscription to database
                await savePushSubscription(subscription);
                
                console.log('Push subscription saved:', subscription);
            } catch (error) {
                console.error('Error registering service worker or subscribing:', error);
            }
        }
        
        // Save push subscription to database
        async function savePushSubscription(subscription) {
            try {
                const { error } = await supabase
                    .from('user_push_subscriptions')
                    .upsert({
                        user_id: currentUserProfile?.id,
                        endpoint: subscription.endpoint,
                        p256dh: subscription.keys.p256dh,
                        auth: subscription.keys.auth
                    });
                
                if (error) throw error;
                console.log('Push subscription saved to DB');
            } catch (error) {
                console.error('Error saving push subscription:', error);
            }
        }
        
        // Helper function for VAPID key conversion
        function urlBase64ToUint8Array(base64String) {
            const padding = '='.repeat((4 - base64String.length % 4) % 4);
            const base64 = (base64String + padding)
                .replace(/\-/g, '+')
                .replace(/_/g, '/');
            const rawData = window.atob(base64);
            const outputArray = new Uint8Array(rawData.length);
            for (let i = 0; i < rawData.length; ++i) {
                outputArray[i] = rawData.charCodeAt(i);
            }
            return outputArray;
        }
        
        // Send OneSignal notification to specific user
        async function sendOneSignalNotification(userId, title, body) {
            try {
                // Get user's OneSignal external ID from database
                const { data: userData } = await supabase
                    .from('users')
                    .select('onesignal_external_id')
                    .eq('id', userId)
                    .single();
                
                if (!userData?.onesignal_external_id) {
                    console.log('User not subscribed to OneSignal:', userId);
                    return;
                }
                
                // Send notification via OneSignal REST API
                const response = await fetch('https://onesignal.com/api/v1/notifications', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Basic YOUR_ONESIGNAL_REST_API_KEY'
                    },
                    body: JSON.stringify({
                        app_id: '62869aa0-7f0e-48b7-a2c3-2172de232257',
                        include_external_user_ids: [userData.onesignal_external_id],
                        headings: { en: title },
                        contents: { en: body },
                        data: {
                            type: 'task_assigned',
                            user_id: userId
                        }
                    })
                });
                
                if (response.ok) {
                    console.log('OneSignal notification sent successfully');
                } else {
                    console.error('OneSignal API error:', await response.text());
                }
            } catch (error) {
                console.error('Error sending OneSignal notification:', error);
            }
        }
        
        // Save notification permission to user profile
        async function saveNotificationPermission(permission) {
            try {
                await supabase
                    .from('users')
                    .update({ notification_enabled: permission === 'granted' })
                    .eq('id', currentUserProfile?.id);
            } catch (error) {
                console.log('Could not save notification permission:', error);
            }
        }
        
        // Send notification to user when assigned to a task
        async function notifyUserAssignedToTask(taskId, assigneeId, assigneeName, creatorName) {
            console.log('Sending notification for task', taskId, 'to assignee', assigneeId);
            
            // Get task details
            const { data: task } = await supabase
                .from('tasks')
                .select('title')
                .eq('id', taskId)
                .single();
            
            if (!task) {
                console.error('Task not found:', taskId);
                return;
            }
            
            // 1. Show local notification for current user (creator/manager)
            if ('Notification' in window && Notification.permission === 'granted') {
                try {
                    const notification = new Notification('📋 Новая задача!', {
                        body: `Задача назначена: ${task.title}\nИсполнитель: ${assigneeName}`,

                        badge: '/icon-192.png',
                        tag: 'task-created-' + Date.now(),
                        requireInteraction: true,
                        silent: false
                    });
                    
                    notification.onclick = function() {

                        navigate('tasks');
                        notification.close();
                    };
                    
                    setTimeout(() => notification.close(), 5000);
                    console.log('Local notification shown for creator');

                    console.log('OneSignal notification queued for assignee:', assigneeId);
                } catch (error) {
                    console.error('Error sending OneSignal notification:', error);

        };
        
        window.login = async function() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showAuthError('Заполните все поля');
                return;
            }
            
            try {
                // Use Supabase Auth directly
                const { data: authData, error: authError } = await supabase.auth.signInWithPassword({
                    email,
                    password
                });
                
                if (authError) {
                    // Handle specific error cases
                    if (authError.message && (authError.message.includes('user_already_exists') || authError.message.includes('already been registered'))) {
                        throw new Error('Пользователь с таким email уже существует. Попробуйте войти или используйте другой email.');
                    }
                    throw new Error(authError.message);
                }
                
                // Store the session
                localStorage.setItem('token', authData.session.access_token);
                localStorage.setItem('supabase_session', JSON.stringify(authData.session));
                
                // Get user profile from users table
                const { data: userData, error: userError } = await supabase
                    .from('users')
                    .select('*')
                    .eq('id', authData.user.id)
                    .single();
                
                if (userError && userError.code !== 'PGRST116') {
                    console.error('Error fetching user profile:', userError);
                }
                
                // Set the current user profile
                currentUser = { id: authData.user.id, email: authData.user.email };
                currentUserProfile = userData && userData.role ? userData : { 
                    id: authData.user.id, 
                    email: authData.user.email, 
                    name: authData.user.email.split('@')[0],
                    role: 'worker'
                };
                
                showApp();
            } catch (error) {
                showAuthError(error.message);
            }
        };
        
        window.register = async function() {
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const role = document.getElementById('registerRole').value;
            const password = document.getElementById('registerPassword').value;

            if (!name || !email || !password) {
                showAuthError('Заполните все поля');
                return;
            }

            if (password.length < 6) {
                showAuthError('Пароль должен быть минимум 6 символов');
                return;
            }

            try {
                // Create user with Supabase Auth
                const { data: authData, error: authError } = await supabase.auth.signUp({
                    email,
                    password
                });

                if (authError) {
                    console.error('Auth signup error:', authError);
                    
                    if (authError.message && authError.message.includes('already been registered')) {
                        throw new Error('Пользователь с таким email уже существует. Попробуйте войти.');
                    }
                    if (authError.message && authError.message.includes('rate limit')) {
                        throw new Error('Слишком много попыток. Попробуйте позже.');
                    }
                    throw new Error(authError.message || 'Ошибка регистрации');
                }

                if (!authData || !authData.user) {
                    if (authData && authData.session) {
                        // Continue with session
                    } else {
                        // Try to sign in directly (might already exist)
                        const { data: signInData, error: signInError } = await supabase.auth.signInWithPassword({
                            email,
                            password
                        });
                        
                        if (signInError) {
                            throw new Error('Не удалось создать пользователя. Попробуйте позже или свяжитесь с администратором.');
                        }
                        
                        authData = signInData;
                    }
                }

                // Try to create user profile in users table
                try {
                    const { error: profileError } = await supabase
                        .from('users')
                        .insert([{
                            id: authData.user.id,
                            email,
                            name,
                            role
                        }]);

                    if (profileError) {
                        console.log('Profile creation note:', profileError.message);
                    }
                } catch (profileCatch) {
                    console.log('Profile creation skipped:', profileCatch.message);
                }

                // Store the session
                localStorage.setItem('token', authData.session.access_token);
                localStorage.setItem('supabase_session', JSON.stringify(authData.session));

                // Set the current user profile
                currentUser = { id: authData.user.id, email: authData.user.email };
                currentUserProfile = {
                    id: authData.user.id,
                    email: authData.user.email,
                    name,
                    role
                };

                showToast('Регистрация успешна!');
                showApp();
            } catch (error) {
                console.error('Registration error:', error);
                showAuthError(error.message || 'Ошибка регистрации. Попробуйте позже.');
            }
        };
        
        window.logout = async function() {
            // Clear the JWT token from localStorage
            localStorage.removeItem('token');
            currentUser = null;
            currentUserProfile = null;
            showLogin();
        };
        
        async function loadCurrentUserProfile() {
            const token = localStorage.getItem('token');

            if (!token) {
                currentUser = null;
                currentUserProfile = null;
                return;
            }

            try {
                // Get user from Supabase using the token
                const { data: { user }, error: userError } = await supabase.auth.getUser(token);

                if (userError) {
                    console.error('Error loading user:', userError);
                    currentUser = null;
                    currentUserProfile = null;
                    localStorage.removeItem('token');
                    return;
                }

                // Get user profile from users table
                const { data: userData, error: profileError } = await supabase
                    .from('users')
                    .select('*')
                    .eq('id', user.id)
                    .single();

                if (profileError && profileError.code !== 'PGRST116') {
                    console.error('Error fetching user profile:', profileError);
                }

                currentUser = { id: user.id, email: user.email };
                currentUserProfile = userData && userData.role ? userData : {
                    id: user.id,
                    email: user.email,
                    name: user.email.split('@')[0],
                    role: 'worker'
                };
            } catch (error) {
                console.error('Error loading user profile:', error);
                currentUser = null;
                currentUserProfile = null;
                localStorage.removeItem('token');
            }
        }
        
        function showAuthError(message) {
            const el = document.getElementById('authError');
            el.textContent = message;
            el.classList.remove('hidden');
        }
        
        function hideAuthError() {
            document.getElementById('authError').classList.add('hidden');
        }
        
        function showLogin() {
            document.getElementById('authScreen').classList.remove('hidden');
            document.getElementById('app').classList.add('hidden');
        }
        
        function showApp() {
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            
            const roleLabel = currentUserProfile?.role === 'manager' ? 'Руководитель' : (currentUserProfile?.role === 'deputy_head' ? 'Зам начальника отдела' : (currentUserProfile?.role === 'worker' ? 'Исполнитель' : 'Исполнитель'));
            document.getElementById('headerTitle').textContent = currentUserProfile?.name || 'Пользователь';
            document.getElementById('headerUser').textContent = '> ' + roleLabel;
            
            // Initialize push notifications
            initNotifications();
            
            renderNav();
            renderContent();
            
            // Show notification permission prompt if needed
            if ('Notification' in window && Notification.permission === 'default') {
                setTimeout(() => {
                    showToast('🔔 Разрешите уведомления для получения задач', 6000);
                }, 2000);
            }
            
            // Check and show pending notifications for current user
            checkAndShowPendingNotifications();
        }
        
        // Check for pending notifications from notification_queue
        async function checkAndShowPendingNotifications() {
            try {
                const { data: notifications, error } = await supabase
                    .from('notification_queue')
                    .select('*')
                    .eq('user_id', currentUserProfile?.id)
                    .eq('sent', false)
                    .order('created_at', { ascending: false })
                    .limit(5);
                
                if (error) throw error;
                
                if (notifications && notifications.length > 0) {
                    // Show latest notification
                    const latestNotif = notifications[0];
                    
                    if ('Notification' in window && Notification.permission === 'granted') {
                        const notification = new Notification(latestNotif.title, {
                            body: latestNotif.body,
                            icon: '/icon-192.png',
                            badge: '/icon-192.png',
                            tag: 'pending-' + Date.now(),
                            requireInteraction: true
                        });
                        
                        notification.onclick = function() {
                            window.focus();
                            navigate('tasks');
                            notification.close();
                        };
                    }
                    
                    // Mark as sent
                    await supabase
                        .from('notification_queue')
                        .update({ sent: true })
                        .eq('id', latestNotif.id);
                    
                    console.log('Shown pending notification:', latestNotif);
                }
            } catch (error) {
                console.error('Error checking pending notifications:', error);
            }
        }
        
        // Check auth state on load
        async function initApp() {
            const token = localStorage.getItem('token');
            
            if (token) {
                await loadCurrentUserProfile();
                // Check if user profile was loaded successfully
                if (currentUserProfile) {
                    showApp();
                } else {
                    showLogin();
                }
            } else {
                showLogin();
            }
        }

        // NAVIGATION
        // ============================================================

            currentProjectId = null;

        };

const buttons = [

        // ============================================================
        // CONTENT RENDERING
        // ============================================================
        async function renderContent() {
            const content = document.getElementById('content');

                switch(currentView) {

                        break;
                    case 'installations':
                        await renderInstallations(content);
                        break;
                    case 'purchaseRequests':

                        break;
                    case 'calendar':
                        await renderCalendar(content);
                        break;

                        await renderDashboard(content);

            }
        }
        
        // ============================================================
        // DASHBOARD
        // ============================================================
        async function renderDashboard(content) {
            const isManager = isElevatedUser();
            
            let html = '<h2 style="margin-bottom: 16px">Главная</h2>';
            
            // Show loading state
            html += '<div id="loading-stats" style="text-align:center;padding:40px;color:var(--text-muted)">Загрузка данных...</div>';
            content.innerHTML = html;
            
            try {
                // Load data with timeout for better UX
                const [projects, tasks, installations, prs] = await Promise.all([
                    isManager ? getProjects() : getMyProjects(),
                    isManager ? getTasks() : getMyTasks(),
                    isManager ? getInstallations() : getMyInstallations(),
                    getPurchaseRequests()
                ]);
                
                // Remove loading indicator
                document.getElementById('loading-stats')?.remove();
                
                // Calculate progress
                const totalItems = tasks.length + installations.length;
                const completedTasks = tasks.filter(t => t.status === 'done').length;
                const completedInstallations = installations.filter(i => i.status === 'done').length;
                const completedItems = completedTasks + completedInstallations;
                const progressPercent = totalItems > 0 ? Math.round((completedItems / totalItems) * 100) : 0;

                // Calculate task status breakdown
                const taskStatusCounts = { new: 0, planned: 0, in_progress: 0, waiting_materials: 0, done: 0, postponed: 0 };
                tasks.forEach(t => { if (taskStatusCounts.hasOwnProperty(t.status)) taskStatusCounts[t.status]++; });

                // Calculate installation status breakdown
                const instStatusCounts = { new: 0, planned: 0, in_progress: 0, waiting_materials: 0, done: 0, postponed: 0 };
                installations.forEach(i => { if (instStatusCounts.hasOwnProperty(i.status)) instStatusCounts[i.status]++; });

                const getStatusLabel = (status) => {
                    const labels = { 'new': 'Новая', 'planned': 'Запланирована', 'in_progress': 'В работе', 'waiting_materials': 'Ожидает материалов', 'done': 'Выполнена', 'postponed': 'Отложена' };
                    return labels[status] || status;
                };

                const getInstStatusLabel = (status) => {
                    const labels = { 'new': 'Новый', 'planned': 'Запланирован', 'in_progress': 'В работе', 'waiting_materials': 'Ожидает материалов', 'done': 'Завершён', 'postponed': 'Отложен' };
                    return labels[status] || status;
                };

                const statusColors = {
                    'new': '#3399ff',
                    'planned': '#FF6B00',
                    'in_progress': '#00D9FF',
                    'waiting_materials': '#ff00cc',
                    'done': '#00FF88',
                    'postponed': '#8892a0'
                };

                html += `
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-value">${projects.length}</div>
                            <div class="stat-label">Проектов</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${tasks.length}</div>
                            <div class="stat-label">Задач</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${installations.length}</div>
                            <div class="stat-label">Монтажей</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${prs.length}</div>
                            <div class="stat-label">Заявок</div>
                        </div>
                    </div>

                    <!-- Progress Bar -->
                    <div class="card">
                        <h3 class="section-title">Общее выполнение</h3>
                        <div style="background: var(--secondary); height: 24px; border-radius: 12px; overflow: hidden; margin-bottom: 10px;">
                            <div style="background: linear-gradient(90deg, var(--success), #66bb6a); height: 100%; width: ${progressPercent}%; transition: width 0.3s ease; border-radius: 12px;"></div>
                        </div>
                        <div style="display: flex; justify-content: space-between; color: var(--text-muted); font-size: 14px;">
                            <span>${progressPercent}% выполнено</span>
                            <span>${completedItems} из ${totalItems} завершено</span>
                        </div>
                    </div>

                    <!-- Task Status Breakdown -->
                    <div class="card">
                        <h3 class="section-title">Статусы задач</h3>
                        ${Object.entries(taskStatusCounts).map(([status, count]) => {
                            const width = tasks.length > 0 ? (count / tasks.length) * 100 : 0;
                            return `
                                <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 12px;">
                                    <span style="min-width: 140px; font-size: 13px;">${getStatusLabel(status)}</span>
                                    <div style="flex: 1; height: 20px; background: var(--secondary); border-radius: 10px; overflow: hidden;">
                                        <div style="height: 100%; width: ${width}%; background: ${statusColors[status]}; border-radius: 10px; transition: width 0.3s ease;"></div>
                                    </div>
                                    <span style="min-width: 30px; text-align: right; font-weight: 500;">${count}</span>
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- Installation Status Breakdown -->
                    <div class="card">
                        <h3 class="section-title">Статусы монтажей</h3>
                        ${Object.entries(instStatusCounts).map(([status, count]) => {
                            const width = installations.length > 0 ? (count / installations.length) * 100 : 0;
                            return `
                                <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 12px;">
                                    <span style="min-width: 140px; font-size: 13px;">${getInstStatusLabel(status)}</span>
                                    <div style="flex: 1; height: 20px; background: var(--secondary); border-radius: 10px; overflow: hidden;">
                                        <div style="height: 100%; width: ${width}%; background: ${statusColors[status]}; border-radius: 10px; transition: width 0.3s ease;"></div>
                                    </div>
                                    <span style="min-width: 30px; text-align: right; font-weight: 500;">${count}</span>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
                
                // Quick actions
                if (isManager) {
                    html += `
                        <button class="btn" onclick="navigate('projects')">Все проекты</button>
                        <button class="btn btn-outline" onclick="showCreateProjectModal()">+ Новый проект</button>
                    `;
                } else {
                    // Worker: show my pending items
                    const myPendingTasks = tasks.filter(t => t.status === 'in_progress' || t.status === 'new');
                    const myPendingInstallations = installations.filter(i => i.status === 'planned' || i.status === 'in_progress');
                    
                    if (myPendingTasks.length > 0) {
                        html += `<h3 class="section-title">Мои задачи</h3>`;
                        myPendingTasks.slice(0, 3).forEach(task => {
                            html += renderTaskCard(task);
                        });
                    }
                    
                    if (myPendingInstallations.length > 0) {
                        html += `<h3 class="section-title">Мои монтажи</h3>`;
                        myPendingInstallations.slice(0, 3).forEach(inst => {
                            html += renderInstallationCard(inst);
                        });
                    }
                }
                
                content.innerHTML = html;
                initSwipeHandlers();
                
            } catch (error) {
                console.error('Dashboard load error:', error);
                document.getElementById('loading-stats').innerHTML = 'Ошибка загрузки: ' + error.message;
            }
        }
        
        // ============================================================
        // PROJECTS
        // ============================================================
        async function getProjects() {
            const { data: projects, error } = await supabase
                .from('projects')
                .select('*')
                .order('created_at', { ascending: false });
            if (error) throw error;
            
            // Get unique creator IDs
            const creatorIds = [...new Set(projects?.map(p => p.created_by).filter(Boolean))];
            
            // Fetch creators if any
            let creators = {};
            if (creatorIds.length > 0) {
                const { data: users } = await supabase
                    .from('users')
                    .select('id, name')
                    .in('id', creatorIds);
                users?.forEach(u => creators[u.id] = u);
            }
            
            // Attach creator names
            return (projects || []).map(p => ({
                ...p,
                users: creators[p.created_by] || null
            }));
        }
        
        async function getMyProjects() {
            const userId = currentUserProfile?.id;

            // Get projects where user has tasks or installations OR is the creator
            const { data: tasks } = await supabase
                .from('tasks')
                .select('project_id')
                .eq('assignee_id', userId);

            const { data: installations } = await supabase
                .from('installations')
                .select('project_id')
                .eq('assignee_id', userId);

            const { data: createdProjects } = await supabase
                .from('projects')
                .select('id')
                .eq('created_by', userId);

            const projectIds = new Set([
                ...(tasks || []).map(t => t.project_id),
                ...(installations || []).map(i => i.project_id),
                ...(createdProjects || []).map(p => p.id)
            ]);

            if (projectIds.size === 0) return [];

            const { data: projects, error } = await supabase
                .from('projects')
                .select('*')
                .in('id', Array.from(projectIds))
                .order('created_at', { ascending: false });

            if (error) throw error;
            
            const creatorIds = [...new Set(projects?.map(p => p.created_by).filter(Boolean))];
            
            let creators = {};
            if (creatorIds.length > 0) {
                const { data: users } = await supabase
                    .from('users')
                    .select('id, name')
                    .in('id', creatorIds);
                users?.forEach(u => creators[u.id] = u);
            }
            
            return (projects || []).map(p => ({
                ...p,
                users: creators[p.created_by] || null
            }));
        }
        
        async function renderProjects(content) {
            const isManager = isElevatedUser();
            let projects = isManager ? await getProjects() : await getMyProjects();
            
            let html = `<h2 style="margin-bottom: 16px">Проекты</h2>`;
            
            if (isManager) {

            if (projects.length === 0) {
                html += '<div class="empty-state"><div class="empty-state-icon">▣</div><p>Нет проектов</p></div>';

                    html += `

            }
            
            content.innerHTML = html;

        async function showProjectDetail(projectId) {
            const { data: project } = await supabase
                .from('projects')
                .select('*')
                .eq('id', projectId)
                .single();

            if (!project) return;

            let creatorName = 'Unknown';
            if (project.created_by) {
                const { data: creator } = await supabase
                    .from('users')
                    .select('name')
                    .eq('id', project.created_by)
                    .single();
                creatorName = creator?.name || 'Unknown';
            }

            const { data: tasks } = await supabase
                .from('tasks')
                .select('*')
                .eq('project_id', projectId)
                .order('created_at', { ascending: false });

            const { data: installations } = await supabase
                .from('installations')
                .select('*')
                .eq('project_id', projectId)
                .order('scheduled_at', { ascending: true });

            const allUserIds = new Set();
            tasks?.forEach(t => t.assignee_id && allUserIds.add(t.assignee_id));
            installations?.forEach(i => i.assignee_id && allUserIds.add(i.assignee_id));

            let usersMap = {};
            if (allUserIds.size > 0) {
                const { data: users } = await supabase
                    .from('users')
                    .select('id, name')
                    .in('id', Array.from(allUserIds));
                users?.forEach(u => usersMap[u.id] = u);
            }

            const tasksWithDetails = (tasks || []).map(t => ({
                ...t,
                users: usersMap[t.assignee_id] || null,
                projects: { name: project.name }
            }));

            const installationsWithDetails = (installations || []).map(i => ({
                ...i,
                users: usersMap[i.assignee_id] || null,
                projects: { name: project.name }
            }));

            let html = `
                <button class="btn btn-outline btn-sm" onclick="navigate('projects')" style="margin-bottom: 16px">← Назад</button>
                <div class="detail-header">
                    <div class="detail-title">${project.name}</div>
                    <div class="detail-meta">${project.description || ''}</div>
                    <div class="detail-meta">Создал: ${creatorName}</div>
                </div>
            `;

            if (tasksWithDetails.length > 0) {
                html += `<h3 class="section-title">Задачи (${tasksWithDetails.length})</h3>`;
                tasksWithDetails.forEach(task => {
                    html += renderTaskCard(task, true);
                });
            }

            if (installationsWithDetails.length > 0) {
                html += `<h3 class="section-title">Монтажи (${installationsWithDetails.length})</h3>`;
                installationsWithDetails.forEach(inst => {
                    html += renderInstallationCard(inst, true);
                });
            }

        function renderTaskCard(task, showProject = false) {

            // Check if task is overdue
            const now = new Date();
            const isOverdue = task.due_date && new Date(task.due_date) < now && task.status !== 'done' && task.status !== 'postponed';
            const overdueClass = isOverdue ? ' overdue' : '';

            // Get first line of description or truncate
            let descriptionHtml = '';
            if (task.description && task.description.trim() !== '') {
                const shortDesc = task.description.length > 50 ? task.description.substring(0, 50) + '...' : task.description;
                descriptionHtml = `<div style="font-size:12px;color:var(--text-muted);margin-top:4px;line-height:1.3;">${shortDesc}</div>`;
            }

            // Show due date if exists
            let dueDateHtml = '';
            if (task.due_date) {
                // Parse the date string directly to avoid timezone issues - due_date is stored as YYYY-MM-DD
                const dueDateParts = task.due_date.split('T')[0].split('-');
                const dueDate = new Date(dueDateParts[0], dueDateParts[1] - 1, dueDateParts[2]);
                const dueDateStr = dueDate.toLocaleDateString('ru-RU');
                const isDueToday = dueDate.toDateString() === now.toDateString();
                const dueDateColor = isOverdue ? 'color: var(--danger);' : (isDueToday ? 'color: var(--warning);' : '');
                dueDateHtml = `<div style="font-size:11px;${dueDateColor}margin-top:4px;">📅 ${dueDateStr}</div>`;

            return `

            if (receiptFields) {
                if (status === 'ready_for_receipt' || status === 'received') {
                    receiptFields.style.display = 'block';
                    if (receivedAtGroup) {
                        receivedAtGroup.style.display = status === 'received' ? 'block' : 'none';
                    }
                } else {
                    receiptFields.style.display = 'none';
                }
            }
        };

        window.updateInstallationStatus = async function(instId) {
            const status = document.getElementById('instStatus').value;
            
            // Build update object
            const updateData = { 
                status, 
                updated_at: new Date().toISOString() 
            };
            
            // Add receipt address and received date for relevant statuses
            if (status === 'ready_for_receipt') {
                const receiptAddress = document.getElementById('instReceiptAddress').value;
                if (!receiptAddress || receiptAddress.trim() === '') {
                    showToast('Введите адрес получения');
                    return;
                }
                updateData.receipt_address = receiptAddress;
            }
            
            if (status === 'received') {
                const receivedAt = document.getElementById('instReceivedAt').value;
                if (!receivedAt) {
                    showToast('Выберите дату получения');
                    return;
                }
                updateData.received_at = receivedAt;
            }

            try {
                const { error } = await supabase
                    .from('installations')
                    .update(updateData)
                    .eq('id', instId);

                if (error) throw error;

                showToast('Статус обновлен');
                showInstallationDetail(instId);
            } catch (error) {
                showToast('Ошибка: ' + error.message);

        window.saveEditedTask = async function(taskId) {
            const title = document.getElementById('editTaskTitle').value;
            const description = document.getElementById('editTaskDescription').value;
            const project_id = document.getElementById('editTaskProject').value;
            const assignee_id = document.getElementById('editTaskAssignee').value;
            const status = document.getElementById('editTaskStatus').value;

            // Only managers can change due_date
            const isManager = currentUserProfile?.role === 'manager';
            let due_date = null;
            
            if (isManager) {
                const due_date_raw = document.getElementById('editTaskDueDate').value;
                // Use raw value directly without parsing since it's already in YYYY-MM-DD format
                if (due_date_raw && /^\d{4}-\d{2}-\d{2}$/.test(due_date_raw)) {
                    due_date = due_date_raw;
                }
            }

            if (!title) {
                showToast('Введите название задачи');
                return;
            }

            try {
                // Get current task to check if assignee changed
                const { data: currentTask } = await supabase
                    .from('tasks')
                    .select('assignee_id')
                    .eq('id', taskId)
                    .single();
                
                const previousAssigneeId = currentTask?.assignee_id;
                const newAssigneeId = assignee_id || null;
                
                // Build update data object
                const updateData = { 
                    title, 
                    description, 
                    project_id: project_id || null, 
                    assignee_id: assignee_id || null, 
                    status,
                    updated_at: new Date().toISOString() 
                };
                
                // Add due_date only if manager and valid
                if (due_date) {
                    updateData.due_date = due_date;
                }
                
                console.log('Updating task with data:', updateData);
                
                const { error } = await supabase
                    .from('tasks')
                    .update(updateData)
                    .eq('id', taskId);

                if (error) throw error;

                // Send notification if assignee was changed to a new user
                if (newAssigneeId && newAssigneeId !== previousAssigneeId) {
                    const { data: assigneeUser } = await supabase
                        .from('users')
                        .select('id, name')
                        .eq('id', newAssigneeId)
                        .single();
                    
                    const creatorName = currentUserProfile?.name || 'Руководитель';
                    await notifyUserAssignedToTask(taskId, assigneeUser?.id, assigneeUser?.name || 'Исполнитель', creatorName);

                renderTasks(document.getElementById('content'));

                showToast('Ошибка: ' + error.message);

        };

        // ============================================================
        // PURCHASE REQUESTS
        // ============================================================
        async function getPurchaseRequests() {
            const userId = currentUserProfile?.id;
            const isManager = isElevatedUser();

            // Simple query - just get PRs without heavy joins
            let query = supabase
                .from('purchase_requests')
                .select('id, status, created_at, task_id, installation_id, created_by, comment, receipt_address, received_at')
                .order('created_at', { ascending: false });

            if (!isManager) {
                query = query.eq('created_by', userId);
            }

            const { data, error } = await query;
            if (error) throw error;

            // Early return if no data
            if (!data || data.length === 0) return [];

            // Get unique IDs in one pass
            const taskIds = [...new Set(data?.map(pr => pr.task_id).filter(Boolean) || [])];
            const installationIds = [...new Set(data?.map(pr => pr.installation_id).filter(Boolean) || [])];
            const creatorIds = [...new Set(data?.map(pr => pr.created_by).filter(Boolean) || [])];

            // Batch fetch all related data in parallel
            const [tasksData, installationsData, usersData] = await Promise.all([
                taskIds.length > 0 ? supabase.from('tasks').select('id, title, project_id').in('id', taskIds) : Promise.resolve({ data: [] }),
                installationIds.length > 0 ? supabase.from('installations').select('id, title, project_id').in('id', installationIds) : Promise.resolve({ data: [] }),
                creatorIds.length > 0 ? supabase.from('users').select('id, name').in('id', creatorIds) : Promise.resolve({ data: [] })
            ]);

            // Build lookup maps
            const tasksMap = {};
            const installationsMap = {};
            const creatorsMap = {};
            const projectIds = new Set();

            tasksData.data?.forEach(t => {
                tasksMap[t.id] = t;
                if (t.project_id) projectIds.add(t.project_id);
            });
            installationsData.data?.forEach(i => {
                installationsMap[i.id] = i;
                if (i.project_id) projectIds.add(i.project_id);
            });
            usersData.data?.forEach(u => creatorsMap[u.id] = u);

            // Fetch projects if needed (single query)
            let projectsMap = {};
            if (projectIds.size > 0) {
                const { data: projects } = await supabase
                    .from('projects')
                    .select('id, name')
                    .in('id', Array.from(projectIds));
                projects?.forEach(p => projectsMap[p.id] = p);
            }

            return (data || []).map(pr => ({
                ...pr,
                users: creatorsMap[pr.created_by] || null,
                tasks: tasksMap[pr.task_id] || null,
                installations: installationsMap[pr.installation_id] || null,
                project: pr.task_id && tasksMap[pr.task_id] ? projectsMap[tasksMap[pr.task_id].project_id] || null :
                         pr.installation_id && installationsMap[pr.installation_id] ? projectsMap[installationsMap[pr.installation_id].project_id] || null : null
            }));
        }

        async function renderPurchaseRequests(content) {
            const prs = await getPurchaseRequests();

            let html = `<h2 style="margin-bottom: 16px">Заявки на материалы</h2>`;

            html += `<button class="btn btn-success" onclick="showCreatePRModal('general')">+ Создать заявку на материалы</button><br><br>`;

            if (prs.length === 0) {
                html += '<div class="empty-state"><div class="empty-state-icon">▤</div><p>Нет заявок</p></div>';
            } else {
                prs.forEach(pr => {
                    const itemType = pr.tasks ? 'Задача: ' + pr.tasks.title : (pr.installations ? 'Монтаж: ' + pr.installations.title : '');
                    const projectInfo = pr.project ? ' | Проект: ' + pr.project.name : '';
                    html += `
                        <div class="card card-clickable" data-id="${pr.id}" data-type="pr" onclick="showPRDetailModal('${pr.id}')">
                            <div class="list-item-header">
                                <div class="list-item-title">Заявка #${pr.id.slice(0, 8)}</div>

                            </div>
                            <div class="list-item-subtitle">${pr.users?.name || ''} - ${itemType}${projectInfo}</div>
                        </div>
                    `;
                });
            }

            content.innerHTML = html;
        }

            if (prItemsList) {

            const materialSelects = document.querySelectorAll('select[id$="Material"]');
            materialSelects.forEach(select => {
                const options = select.querySelectorAll('option');
                options.forEach(option => {

                        option.style.display = 'none';
                    }
                });
            });
