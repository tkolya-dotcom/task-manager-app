<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0A0A0F">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Планировщик</title>
    <link rel="manifest" href="manifest.json">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Orbitron:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ========================================
           CSS VARIABLES - Cyberpunk/JARVIS/Matrix Theme
           ======================================== */
        :root {
            --primary: #0A0A0F;
            --secondary: #1A1A2E;
            --accent: #00D9FF;
            --accent2: #00FF88;
            --glow: #0080FF;
            --text: #E0E0E0;
            --text-muted: #8892a0;
            --warning: #FF6B00;
            --success: #00FF88;
            --danger: #FF3366;
            --border: rgba(0, 217, 255, 0.15);

            /* Gradients */
            --gradient-javis: linear-gradient(135deg, rgba(0, 128, 255, 0.2) 0%, rgba(0, 217, 255, 0.1) 100%);
            --gradient-matrix: linear-gradient(180deg, rgba(0, 255, 136, 0.1) 0%, transparent 100%);
            --gradient-card: linear-gradient(145deg, #1A1A2E 0%, #12121f 100%);

            /* Shadows & Glows */
            --glow-cyan: 0 0 20px rgba(0, 217, 255, 0.3), 0 0 40px rgba(0, 217, 255, 0.1);
            --glow-green: 0 0 20px rgba(0, 255, 136, 0.3), 0 0 40px rgba(0, 255, 136, 0.1);
            --glow-blue: 0 0 20px rgba(0, 128, 255, 0.3), 0 0 40px rgba(0, 128, 255, 0.1);
            --shadow-card: 0 4px 20px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        /* ========================================
           BASE STYLES
           ======================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: transparent;
            min-height: 100vh;
            font-size: 16px;
            line-height: 1.5;
            color: var(--text);
        }



        /* ========================================
           TYPOGRAPHY
           ======================================== */
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
            color: var(--accent);
            text-shadow: 0 0 10px rgba(0, 217, 255, 0.5);
            letter-spacing: 0.5px;
        }

        h1 { font-size: 28px; font-weight: 700; }
        h2 { font-size: 24px; font-weight: 600; }
        h3 { font-size: 20px; font-weight: 500; }

        .title-glow {
            text-shadow: 
                0 0 10px var(--accent),
                0 0 20px var(--accent),
                0 0 40px var(--glow);
        }

        .text-matrix {
            color: var(--accent2);
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        /* ========================================
           LAYOUT
           ======================================== */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
            padding-bottom: 80px;
            position: relative;
            z-index: 1;
        }

        /* ========================================
           HEADER
           ======================================== */
        .header {
            background: linear-gradient(180deg, rgba(26, 26, 46, 0.95) 0%, rgba(26, 26, 46, 0.8) 100%);
            border-bottom: 1px solid var(--border);
            padding: 16px;
            margin: -16px -16px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.5;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
            text-shadow: 0 0 10px rgba(0, 217, 255, 0.5);
        }

        .header-user {
            font-size: 12px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid rgba(255, 51, 102, 0.5);
            color: var(--danger);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: rgba(255, 51, 102, 0.1);
            box-shadow: 0 0 15px rgba(255, 51, 102, 0.3);
            border-color: var(--danger);
        }

        /* ========================================
           CARDS
           ======================================== */
        .card {
            background: var(--gradient-card);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.3;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--glow-cyan);
            border-color: var(--accent);
        }

        .card-clickable {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .card-clickable:active {
            transform: scale(0.98);
        }

        .card h3 {
            font-size: 16px;
            margin-bottom: 8px;
            color: var(--text);
            font-family: 'Orbitron', sans-serif;
            font-weight: 500;
        }

        .card p {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        /* ========================================
           BUTTONS
           ======================================== */
        .btn {
            background: linear-gradient(135deg, var(--accent) 0%, var(--glow) 100%);
            color: var(--primary);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            box-shadow: var(--glow-cyan);
            transform: translateY(-2px);
        }

        .btn:active {
            opacity: 0.9;
            transform: scale(0.98);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--accent2) 0%, #00cc6a 100%);
            color: var(--primary);
        }

        .btn-success:hover {
            box-shadow: var(--glow-green);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger) 0%, #cc0044 100%);
            color: white;
        }

        .btn-danger:hover {
            box-shadow: 0 0 20px rgba(255, 51, 102, 0.4);
        }

        .btn-secondary {
            background: var(--secondary);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            box-shadow: var(--glow-cyan);
        }

        .btn-warning {
            background: linear-gradient(135deg, var(--warning) 0%, #cc5500 100%);
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        .btn-outline:hover {
            background: rgba(0, 217, 255, 0.1);
            box-shadow: var(--glow-cyan);
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 14px;
            width: auto;
            font-family: 'Inter', sans-serif;
        }

        /* ========================================
           FORM ELEMENTS
           ======================================== */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 4px;
            font-size: 14px;
            color: var(--accent);
            font-weight: 500;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 0.5px;
        }

        .form-group input, 
        .form-group select, 
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            background: rgba(10, 10, 15, 0.8);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .form-group input:focus, 
        .form-group select:focus, 
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(0, 217, 255, 0.2), inset 0 0 10px rgba(0, 217, 255, 0.05);
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }

        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }

        /* ========================================
           STATUS BADGES
           ======================================== */
        .status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 1px solid;
        }

        .status-new {
            background: rgba(0, 128, 255, 0.2);
            color: #3399ff;
            border-color: #3399ff;
        }

        .status-planned {
            background: rgba(255, 107, 0, 0.2);
            color: #FF6B00;
            border-color: #FF6B00;
        }

        .status-in_progress {
            background: rgba(0, 217, 255, 0.2);
            color: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(0, 217, 255, 0.2);
        }

        .status-waiting_materials {
            background: rgba(255, 0, 204, 0.2);
            color: #ff00cc;
            border-color: #ff00cc;
        }

        .status-done {
            background: rgba(0, 255, 136, 0.2);
            color: var(--accent2);
            border-color: var(--accent2);
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.2);
        }

        .status-postponed {
            background: rgba(136, 146, 160, 0.2);
            color: var(--text-muted);
            border-color: var(--text-muted);
        }

        .status-draft {
            background: rgba(136, 146, 160, 0.2);
            color: var(--text-muted);
            border-color: var(--text-muted);
        }

        .status-pending {
            background: rgba(255, 107, 0, 0.2);
            color: #FF6B00;
            border-color: #FF6B00;
            animation: pulse 2s infinite;
        }

        .status-approved {
            background: rgba(0, 255, 136, 0.2);
            color: var(--accent2);
            border-color: var(--accent2);
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.2);
        }

        .status-rejected {
            background: rgba(255, 51, 102, 0.2);
            color: var(--danger);
            border-color: var(--danger);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* ========================================
           NAVIGATION
           ======================================== */
        .nav {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 8px;
            margin-bottom: 16px;
            max-width: 100%;
        }

        @media (max-width: 768px) {
            .nav {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .nav {
                grid-template-columns: 1fr;
            }
        }

        .nav::-webkit-scrollbar {
            height: 4px;
        }

        .nav::-webkit-scrollbar-track {
            background: var(--secondary);
            border-radius: 2px;
        }

        .nav::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 2px;
        }

        .nav-btn {
            background: var(--secondary);
            border: 1px solid var(--border);
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 13px;
            white-space: nowrap;
            cursor: pointer;
            color: var(--text-muted);
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .nav-btn.active {
            background: linear-gradient(135deg, var(--accent) 0%, var(--glow) 100%);
            color: var(--primary);
            border-color: var(--accent);
            font-weight: 600;
            box-shadow: var(--glow-cyan);
        }

        /* ========================================
           LIST ITEMS
           ======================================== */
        .list-item {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            background: var(--secondary);
            border-radius: 8px;
            margin-bottom: 8px;
            transition: all 0.3s ease;
        }

        .list-item:hover {
            background: rgba(0, 217, 255, 0.05);
            border-color: var(--accent);
        }

        .list-item:active {
            background: rgba(0, 217, 255, 0.1);
        }

        .list-item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 4px;
        }

        .list-item-title {
            font-weight: 500;
            color: var(--text);
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
        }

        .list-item-subtitle {
            font-size: 13px;
            color: var(--text-muted);
        }

        /* ========================================
           LOADING
           ======================================== */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .loading-spinner {
            border: 3px solid var(--secondary);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
            box-shadow: 0 0 10px var(--accent);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ========================================
           UTILITIES
           ======================================== */
        .hidden {
            display: none !important;
        }

        /* ========================================
           AUTH SCREEN
           ======================================== */
        .auth-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
            background: 
                radial-gradient(ellipse at top, rgba(0, 128, 255, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at bottom, rgba(0, 255, 136, 0.1) 0%, transparent 50%),
                linear-gradient(180deg, #0A0A0F 0%, #12121f 100%);
            position: relative;
            z-index: 1;
        }

        /* Matrix rain effect for auth */
        .auth-screen::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 255, 136, 0.02) 2px,
                    rgba(0, 255, 136, 0.02) 4px
                );
            pointer-events: none;
        }

        .auth-box {
            background: var(--gradient-card);
            padding: 32px 24px;
            border-radius: 16px;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .auth-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), var(--accent), transparent);
            animation: scanline 3s linear infinite;
        }

        @keyframes scanline {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .auth-box h2 {
            text-align: center;
            margin-bottom: 8px;
            color: var(--accent);
            font-size: 28px;
            text-shadow: 0 0 20px var(--accent);
            font-family: 'Orbitron', sans-serif;
        }

        .auth-box .subtitle {
            text-align: center;
            margin-bottom: 24px;
            color: var(--text-muted);
            font-size: 14px;
            font-family: 'JetBrains Mono', monospace;
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 24px;
            border-bottom: 2px solid var(--border);
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            color: var(--text-muted);
            font-weight: 500;
            transition: all 0.3s ease;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
        }

        .auth-tab:hover {
            color: var(--accent);
        }

        .auth-tab.active {
            border-bottom-color: var(--accent);
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
        }

        .auth-error {
            background: rgba(255, 51, 102, 0.2);
            color: var(--danger);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            border: 1px solid var(--danger);
            font-family: 'JetBrains Mono', monospace;
        }

        /* ========================================
           TABS
           ======================================== */
        .tabs {
            display: flex;
            border-bottom: 2px solid var(--border);
            margin-bottom: 16px;
        }

        .tab {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            font-weight: 500;
            color: var(--text-muted);
            transition: all 0.3s ease;
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
        }

        .tab:hover {
            color: var(--accent);
        }

        .tab.active {
            border-bottom-color: var(--accent);
            color: var(--accent);
        }

        /* ========================================
           MODAL
           ======================================== */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 0;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: var(--gradient-card);
            border-radius: 16px 16px 0 0;
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
            border: 1px solid var(--border);
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.5);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: var(--secondary);
            z-index: 10;
        }

        .modal-header h3 {
            font-size: 18px;
            color: var(--accent);
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-muted);
            padding: 4px;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            color: var(--danger);
            text-shadow: 0 0 10px var(--danger);
        }

        .modal-body {
            padding: 20px;
        }

        /* ========================================
           ACTIONS
           ======================================== */
        .actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .actions .btn {
            flex: 1;
        }

        /* ========================================
           CALENDAR
           ======================================== */
        .calendar {
            background: var(--gradient-card);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: linear-gradient(180deg, var(--secondary) 0%, rgba(26, 26, 46, 0.8) 100%);
            color: var(--accent);
            border-bottom: 1px solid var(--border);
        }

        .calendar-nav {
            background: none;
            border: 1px solid var(--border);
            color: var(--accent);
            font-size: 20px;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .calendar-nav:hover {
            background: rgba(0, 217, 255, 0.1);
            box-shadow: var(--glow-cyan);
        }

        .calendar-month {
            font-size: 16px;
            font-weight: 600;
            font-family: 'Orbitron', sans-serif;
        }

        .calendar-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            background: var(--primary);
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }

        .calendar-weekday {
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
            font-family: 'Orbitron', sans-serif;
        }

        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 4px;
            font-size: 14px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.3s ease;
            color: var(--text);
        }

        .calendar-day:hover {
            background: rgba(0, 217, 255, 0.1);
            border-color: var(--accent);
        }

        .calendar-day.other-month {
            color: var(--text-muted);
            opacity: 0.4;
        }

        .calendar-day.today {
            background: rgba(0, 217, 255, 0.2);
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(0, 217, 255, 0.3);
            font-weight: 600;
        }

        .calendar-day.has-items {
            background: rgba(0, 255, 136, 0.1);
            border-color: rgba(0, 255, 136, 0.3);
        }

            font-size: 9px;
            color: var(--accent2);
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-family: 'JetBrains Mono', monospace;

            padding: 10px 12px;
            margin-bottom: 8px;
            background: var(--secondary);
            border-radius: 8px;
            border-left: 3px solid var(--accent);

           BOTTOM NAV
           ======================================== */

            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(180deg, rgba(26, 26, 46, 0.95) 0%, rgba(26, 26, 46, 0.9) 100%);

            justify-content: space-around;
            padding: 8px 0;
            border-top: 1px solid var(--border);
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .bottom-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px 16px;
            color: var(--text-muted);
            font-size: 11px;
            cursor: pointer;
            background: none;
            border: none;
            transition: all 0.3s ease;
        }

        .bottom-nav-item:hover,
        .bottom-nav-item.active {
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
        }

        .bottom-nav-icon {
            font-size: 20px;
            margin-bottom: 2px;
        }

        /* ========================================
           STATS
           ======================================== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: var(--gradient-card);
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--glow-cyan);
            border-color: var(--accent);
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 10px var(--accent);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ========================================
           DETAIL VIEW
           ======================================== */
        .detail-header {
            margin-bottom: 16px;
        }

        .detail-title {
            font-size: 22px;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 8px;
            font-family: 'Orbitron', sans-serif;
        }

        .detail-meta {
            font-size: 14px;
            color: var(--text-muted);
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--accent);
            font-family: 'Orbitron', sans-serif;
        }

        /* ========================================
           PR ITEMS
           ======================================== */
        .pr-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 12px;
            background: var(--secondary);
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .pr-item:hover {
            border-color: var(--accent);
        }

        .pr-item-name {
            font-weight: 500;
            color: var(--text);
        }

        .pr-item-qty {
            color: var(--accent);
            font-size: 14px;
            font-family: 'JetBrains Mono', monospace;
        }

        /* ========================================
           EMPTY STATE
           ======================================== */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            filter: grayscale(0.5);
        }

        /* ========================================
           TOAST
           ======================================== */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--secondary);
            color: var(--text);
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 2000;
            animation: fadeIn 0.3s ease;
            border: 1px solid var(--accent);
            box-shadow: var(--glow-cyan);
            font-family: 'JetBrains Mono', monospace;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* ========================================
           CHOICES & BADGES
           ======================================== */
        .choices-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }

        .note-badge {
            display: inline-flex;
            align-items: center;
            background: var(--secondary);
            border-radius: 16px;
            padding: 4px 8px;
            font-size: 12px;
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .note-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            margin-right: 6px;
            flex-shrink: 0;
            box-shadow: 0 0 8px var(--accent);
        }

        .note-text {
            font-weight: 500;
        }

        /* ========================================
           ITEM ROW
           ======================================== */
        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .item-row:last-child {
            border-bottom: none;
        }

        /* ========================================
           SCROLLBAR
           ======================================== */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent2);
        }

        /* ========================================
           GLITCH EFFECT (for headings)
           ======================================== */
        .glitch {
            position: relative;
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0%, 90%, 100% { text-shadow: 0 0 10px var(--accent); }
            92% { text-shadow: -2px 0 var(--danger), 2px 0 var(--accent2); }
            94% { text-shadow: 2px 0 var(--accent), -2px 0 var(--accent2); }
        }

        /* ========================================
           RESPONSIVE
           ======================================== */
        @media (max-width: 480px) {
            h1 { font-size: 24px; }
            h2 { font-size: 20px; }
            h3 { font-size: 18px; }
            
            .auth-box {
                padding: 24px 16px;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Auth Screen -->
    <div id="authScreen" class="auth-screen">
        <div class="auth-box">
            <h2 class="glitch">ПЛАНИРОВЩИК</h2>
            <p class="subtitle">> Управление задачами и монтажами_</p>
            
            <div class="auth-tabs">
                <div class="auth-tab active" data-tab="login">ВХОД</div>
                <div class="auth-tab" data-tab="register">РЕГИСТРАЦИЯ</div>
            </div>
            
            <div id="authError" class="auth-error hidden"></div>
            
            <!-- Login Form -->
            <div id="loginForm">
                <div class="form-group">
                    <label>EMAIL</label>
                    <input type="email" id="loginEmail" placeholder="email@example.com">
                </div>
                <div class="form-group">
                    <label>ПАРОЛЬ</label>
                    <input type="password" id="loginPassword" placeholder="********">
                </div>
                <button class="btn" onclick="login()">ВОЙТИ</button>
            </div>
            
            <!-- Register Form -->
            <div id="registerForm" class="hidden">
                <div class="form-group">
                    <label>ИМЯ</label>
                    <input type="text" id="registerName" placeholder="Ваше имя">
                </div>
                <div class="form-group">
                    <label>EMAIL</label>
                    <input type="email" id="registerEmail" placeholder="email@example.com">
                </div>
                <div class="form-group">
                    <label>РОЛЬ</label>
                    <select id="registerRole">
                        <option value="worker">Исполнитель</option>
                        <option value="manager">Руководитель</option>
                        <option value="deputy_head">Зам начальника отдела</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>ПАРОЛЬ</label>
                    <input type="password" id="registerPassword" placeholder="********">
                </div>
                <button class="btn" onclick="register()">ЗАРЕГИСТРИРОВАТЬСЯ</button>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="container hidden">
        <div class="header">
            <div>
                <h1 id="headerTitle" class="title-glow">Планировщик</h1>
                <div id="headerUser" class="header-user"></div>
            </div>
            <button class="logout-btn" onclick="logout()">Выход</button>
        </div>
        
        <!-- Navigation -->
        <div class="nav" id="nav"></div>
        
        <!-- Content -->
        <div id="content"></div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Заголовок</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div id="modalBody" class="modal-body"></div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast hidden"></div>

    <!-- Matrix Rain Canvas -->
    <canvas id="matrix-canvas" style="position: fixed; top: 0; left: 0; z-index: -1;"></canvas>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script type="module">
        // ============================================================
        // CONFIGURATION - Replace with your Supabase credentials
        // ============================================================
        const SUPABASE_URL = 'https://jmxjbdnqnzkzxgsfywha.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpteGpiZG5xbnprenhnc2Z5d2hhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExNTQ0MzQsImV4cCI6MjA4NjczMDQzNH0.z6y6DGs9Z6kojQYeAdsgKA-m4pxuoeABdY4rAojPEE4';
        
        // JWT token helper function
        function getAuthHeaders() {
            const token = localStorage.getItem('token');
            return {
                'Content-Type': 'application/json',
                ...(token ? { 'Authorization': `Bearer ${token}` } : {})
            };
        }
        
        // Initialize Supabase client (kept for potential fallback usage)
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // ============================================================
        // STATE
        // ============================================================
        let currentUser = null;
        let currentUserProfile = null;
        let currentView = 'dashboard';
        let currentProjectId = null;
        
        // Purchase request state
        let prType = null;
        let prRefId = null;
        
        // Calendar state
        let calendarDate = new Date();
        
        // Filter state
        let taskStatusFilter = 'all';
        let installationStatusFilter = 'all';
        let prStatusFilter = 'all';
        
        // Helper function to check if user has elevated privileges (manager or deputy_head)
        function isElevatedUser() {
            return currentUserProfile?.role === 'manager' || currentUserProfile?.role === 'deputy_head';
        }
        
        // ============================================================
        // AUTH FUNCTIONS
        // ============================================================
        window.showAuthTab = function(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'login') {
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('registerForm').classList.add('hidden');
            } else {
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('registerForm').classList.remove('hidden');
            }
            hideAuthError();
        };
        
        window.login = async function() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showAuthError('Заполните все поля');
                return;
            }
            
            try {
                // Use Supabase Auth directly
                const { data: authData, error: authError } = await supabase.auth.signInWithPassword({
                    email,
                    password
                });
                
                if (authError) {
                    // Handle specific error cases
                    if (authError.message && (authError.message.includes('user_already_exists') || authError.message.includes('already been registered'))) {
                        throw new Error('Пользователь с таким email уже существует. Попробуйте войти или используйте другой email.');
                    }
                    throw new Error(authError.message);
                }
                
                // Store the session
                localStorage.setItem('token', authData.session.access_token);
                localStorage.setItem('supabase_session', JSON.stringify(authData.session));
                
                // Get user profile from users table
                const { data: userData, error: userError } = await supabase
                    .from('users')
                    .select('*')
                    .eq('id', authData.user.id)
                    .single();
                
                if (userError && userError.code !== 'PGRST116') {
                    console.error('Error fetching user profile:', userError);
                }
                
                // Set the current user profile
                currentUser = { id: authData.user.id, email: authData.user.email };
                currentUserProfile = userData && userData.role ? userData : { 
                    id: authData.user.id, 
                    email: authData.user.email, 
                    name: authData.user.email.split('@')[0],
                    role: 'worker'
                };
                
                showApp();
            } catch (error) {
                showAuthError(error.message);
            }
        };
        
        window.register = async function() {
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const role = document.getElementById('registerRole').value;
            const password = document.getElementById('registerPassword').value;

            if (!name || !email || !password) {
                showAuthError('Заполните все поля');
                return;
            }

            if (password.length < 6) {
                showAuthError('Пароль должен быть минимум 6 символов');
                return;
            }

            try {
                // Create user with Supabase Auth
                const { data: authData, error: authError } = await supabase.auth.signUp({
                    email,
                    password
                });

                if (authError) {
                    console.error('Auth signup error:', authError);
                    
                    if (authError.message && authError.message.includes('already been registered')) {
                        throw new Error('Пользователь с таким email уже существует. Попробуйте войти.');
                    }
                    if (authError.message && authError.message.includes('rate limit')) {
                        throw new Error('Слишком много попыток. Попробуйте позже.');
                    }
                    throw new Error(authError.message || 'Ошибка регистрации');
                }

                if (!authData || !authData.user) {
                    if (authData && authData.session) {
                        // Continue with session
                    } else {
                        // Try to sign in directly (might already exist)
                        const { data: signInData, error: signInError } = await supabase.auth.signInWithPassword({
                            email,
                            password
                        });
                        
                        if (signInError) {
                            throw new Error('Не удалось создать пользователя. Попробуйте позже или свяжитесь с администратором.');
                        }
                        
                        authData = signInData;
                    }
                }

                // Try to create user profile in users table
                try {
                    const { error: profileError } = await supabase
                        .from('users')
                        .insert([{
                            id: authData.user.id,
                            email,
                            name,
                            role
                        }]);

                    if (profileError) {
                        console.log('Profile creation note:', profileError.message);
                    }
                } catch (profileCatch) {
                    console.log('Profile creation skipped:', profileCatch.message);
                }

                // Store the session
                localStorage.setItem('token', authData.session.access_token);
                localStorage.setItem('supabase_session', JSON.stringify(authData.session));

                // Set the current user profile
                currentUser = { id: authData.user.id, email: authData.user.email };
                currentUserProfile = {
                    id: authData.user.id,
                    email: authData.user.email,
                    name,
                    role
                };

                showToast('Регистрация успешна!');
                showApp();
            } catch (error) {
                console.error('Registration error:', error);
                showAuthError(error.message || 'Ошибка регистрации. Попробуйте позже.');
            }
        };
        
        window.logout = async function() {
            // Clear the JWT token from localStorage
            localStorage.removeItem('token');
            currentUser = null;
            currentUserProfile = null;
            showLogin();
        };
        
        async function loadCurrentUserProfile() {
            const token = localStorage.getItem('token');

            if (!token) {
                currentUser = null;
                currentUserProfile = null;
                return;
            }

            try {
                // Get user from Supabase using the token
                const { data: { user }, error: userError } = await supabase.auth.getUser(token);

                if (userError) {
                    console.error('Error loading user:', userError);
                    currentUser = null;
                    currentUserProfile = null;
                    localStorage.removeItem('token');
                    return;
                }

                // Get user profile from users table
                const { data: userData, error: profileError } = await supabase
                    .from('users')
                    .select('*')
                    .eq('id', user.id)
                    .single();

                if (profileError && profileError.code !== 'PGRST116') {
                    console.error('Error fetching user profile:', profileError);
                }

                currentUser = { id: user.id, email: user.email };
                currentUserProfile = userData && userData.role ? userData : {
                    id: user.id,
                    email: user.email,
                    name: user.email.split('@')[0],
                    role: 'worker'
                };
            } catch (error) {
                console.error('Error loading user profile:', error);
                currentUser = null;
                currentUserProfile = null;
                localStorage.removeItem('token');
            }
        }
        
        function showAuthError(message) {
            const el = document.getElementById('authError');
            el.textContent = message;
            el.classList.remove('hidden');
        }
        
        function hideAuthError() {
            document.getElementById('authError').classList.add('hidden');
        }
        
        function showLogin() {
            document.getElementById('authScreen').classList.remove('hidden');
            document.getElementById('app').classList.add('hidden');
        }
        
        function showApp() {
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            
            const roleLabel = currentUserProfile?.role === 'manager' ? 'Руководитель' : (currentUserProfile?.role === 'deputy_head' ? 'Зам начальника отдела' : (currentUserProfile?.role === 'worker' ? 'Исполнитель' : 'Исполнитель'));
            document.getElementById('headerTitle').textContent = currentUserProfile?.name || 'Пользователь';
            document.getElementById('headerUser').textContent = '> ' + roleLabel;
            
            renderNav();
            renderContent();
        }
        
        // Check auth state on load
        async function initApp() {
            const token = localStorage.getItem('token');
            
            if (token) {
                await loadCurrentUserProfile();
                // Check if user profile was loaded successfully
                if (currentUserProfile) {
                    showApp();
                } else {
                    showLogin();
                }
            } else {
                showLogin();
            }
        }
        
        // ============================================================
        // NAVIGATION
        // ============================================================
        window.navigate = function(view) {
            currentView = view;
            currentProjectId = null;
            renderNav();
            renderContent();
        };
        
        function renderNav() {
            const nav = document.getElementById('nav');
            const isManager = isElevatedUser();

            const buttons = [
                { id: 'dashboard', label: 'Главная', icon: '⌂' },
                { id: 'projects', label: 'Проекты', icon: '▣' },
                { id: 'tasks', label: 'Задачи', icon: '☰' },
                { id: 'installations', label: 'Монтажи', icon: '⚙' },
                { id: 'calendar', label: 'Календарь', icon: '▦' },
                { id: 'scheme', label: 'Схема', icon: '◫' }
            ];

            // Show "Заявки" tab for all users
            buttons.push({ id: 'purchaseRequests', label: 'Заявки', icon: '▤' });

            nav.innerHTML = buttons.map(btn =>
                `<button class="nav-btn ${currentView === btn.id ? 'active' : ''}" onclick="navigate('${btn.id}')">${btn.icon} ${btn.label}</button>`
            ).join('');
        }
        
        // ============================================================
        // CONTENT RENDERING
        // ============================================================
        async function renderContent() {
            const content = document.getElementById('content');
            content.innerHTML = '<div class="loading"><div class="loading-spinner"></div>Загрузка...</div>';
            
            try {
                switch(currentView) {
                    case 'dashboard':
                        await renderDashboard(content);
                        break;
                    case 'projects':
                        await renderProjects(content);
                        break;
                    case 'tasks':
                        await renderTasks(content);
                        break;
                    case 'installations':
                        await renderInstallations(content);
                        break;
                    case 'purchaseRequests':
                        await renderPurchaseRequests(content);
                        break;
                    case 'calendar':
                        await renderCalendar(content);
                        break;
                    case 'scheme':
                        await renderScheme(content);
                        break;
                    default:
                        await renderDashboard(content);
                }
            } catch (error) {
                console.error('Render error:', error);
                content.innerHTML = `<div class="card"><p style="color: var(--danger)">Ошибка: ${error.message}</p></div>`;
            }
        }
        
        // ============================================================
        // DASHBOARD
        // ============================================================
        async function renderDashboard(content) {
            const isManager = isElevatedUser();
            
            let html = '<h2 style="margin-bottom: 16px">Главная</h2>';
            
            // Stats
            const [projects, tasks, installations, prs] = await Promise.all([
                isManager ? getProjects() : getMyProjects(),
                isManager ? getTasks() : getMyTasks(),
                isManager ? getInstallations() : getMyInstallations(),
                getPurchaseRequests()
            ]);
            
            html += `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value">${projects.length}</div>
                        <div class="stat-label">Проектов</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${tasks.length}</div>
                        <div class="stat-label">Задач</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${installations.length}</div>
                        <div class="stat-label">Монтажей</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${prs.length}</div>
                        <div class="stat-label">Заявок</div>
                    </div>
                </div>

        // ============================================================
        // PURCHASE REQUESTS
        // ============================================================
        async function getPurchaseRequests() {
            const userId = currentUserProfile?.id;
            const isManager = isElevatedUser();

            let query = supabase
                .from('purchase_requests')
                .select('*')
                .order('created_at', { ascending: false });

            if (!isManager) {
                query = query.eq('created_by', userId);
            }

            const { data, error } = await query;
            if (error) throw error;

            const prIds = data?.map(pr => pr.id) || [];
            const taskIds = data?.map(pr => pr.task_id).filter(Boolean) || [];
            const installationIds = data?.map(pr => pr.installation_id).filter(Boolean) || [];
            const creatorIds = data?.map(pr => pr.created_by).filter(Boolean) || [];

            let tasksMap = {};
            let installationsMap = {};
            let creatorsMap = {};

            if (taskIds.length > 0) {
                const { data: tasks } = await supabase
                    .from('tasks')
                    .select('id, title')
                    .in('id', taskIds);
                tasks?.forEach(t => tasksMap[t.id] = t);
            }

            if (installationIds.length > 0) {
                const { data: installations } = await supabase
                    .from('installations')
                    .select('id, title')
                    .in('id', installationIds);
                installations?.forEach(i => installationsMap[i.id] = i);
            }

            if (creatorIds.length > 0) {
                const { data: users } = await supabase
                    .from('users')
                    .select('id, name')
                    .in('id', creatorIds);
                users?.forEach(u => creatorsMap[u.id] = u);
            }

            return (data || []).map(pr => ({
                ...pr,
                users: creatorsMap[pr.created_by] || null,
                tasks: tasksMap[pr.task_id] || null,
                installations: installationsMap[pr.installation_id] || null
            }));
        }

        async function renderPurchaseRequests(content) {
            const prs = await getPurchaseRequests();

            let html = `<h2 style="margin-bottom: 16px">Заявки на материалы</h2>`;

            html += `<button class="btn btn-success" onclick="showCreatePRModal('general')">+ Создать заявку на материалы</button><br><br>`;

            if (prs.length === 0) {
                html += '<div class="empty-state"><div class="empty-state-icon">▤</div><p>Нет заявок</p></div>';
            } else {
                prs.forEach(pr => {
                    const itemType = pr.tasks ? 'Задача: ' + pr.tasks.title : (pr.installations ? 'Монтаж: ' + pr.installations.title : '');
                    html += `
                        <div class="card card-clickable" onclick="showPRDetail('${pr.id}')">
                            <div class="list-item-header">
                                <div class="list-item-title">Заявка #${pr.id.slice(0, 8)}</div>
                                <span class="status status-${pr.status}">${getPRStatusLabel(pr.status)}</span>
                            </div>
                            <div class="list-item-subtitle">${pr.users?.name || ''} - ${itemType}</div>
                        </div>
                    `;
                });
            }

            content.innerHTML = html;
        }

        async function showPRDetail(prId) {
            const { data: pr } = await supabase
                .from('purchase_requests')
                .select('*')
                .eq('id', prId)
                .single();

            if (!pr) return;

            let creatorName = 'Unknown';
            let approverName = null;
            let taskTitle = null;
            let installationTitle = null;

            if (pr.created_by) {
                const { data: creator } = await supabase
                    .from('users')
                    .select('name')
                    .eq('id', pr.created_by)
                    .single();
                creatorName = creator?.name || 'Unknown';
            }

            if (pr.approved_by) {
                const { data: approver } = await supabase
                    .from('users')
                    .select('name')
                    .eq('id', pr.approved_by)
                    .single();
                approverName = approver?.name || null;
            }

            if (pr.task_id) {
                const { data: task } = await supabase
                    .from('tasks')
                    .select('title')
                    .eq('id', pr.task_id)
                    .single();
                taskTitle = task?.title || null;
            }

            if (pr.installation_id) {
                const { data: installation } = await supabase
                    .from('installations')
                    .select('title')
                    .eq('id', pr.installation_id)

                installationTitle = installation?.title || null;
            }

            const { data: items } = await supabase
                .from('purchase_request_items')
                .select('*')
                .eq('purchase_request_id', prId);

            const isManager = currentUserProfile?.role === 'manager';
            const isOwner = String(pr.created_by) === String(currentUserProfile?.id);
            const canApprove = isManager && pr.status === 'pending';
            const canEdit = isOwner && (pr.status === 'rejected' || pr.status === 'draft');

            const itemType = taskTitle ? 'Задача: ' + taskTitle : (installationTitle ? 'Монтаж: ' + installationTitle : '');

            let html = `
                <button class="btn btn-outline btn-sm" onclick="navigate('purchaseRequests')" style="margin-bottom: 16px">← Назад</button>

                items.forEach(item => {
                    html += `
                        <div class="pr-item">
                            <div>
                                <div class="pr-item-name">${item.name}</div>
                                ${item.note ? `<div style="font-size: 12px; color: var(--text-muted)">${item.note}</div>` : ''}
                            </div>
                            <div class="pr-item-qty">${item.quantity} ${item.unit}</div>
                        </div>
                    `;
                });
            }

            if (canApprove) {
                html += `
                    <div class="card">
                        <h3 class="section-title">Изменить статус заявки</h3>
                        <div class="form-group">
                            <label>Новый статус</label>
                            <select id="prStatus" onchange="togglePickupAddress()">
                                <option value="approved" ${pr.status === 'approved' ? 'selected' : ''}>На согласована</option>
                                <option value="ordered" ${pr.status === 'ordered' ? 'selected' : ''}>В заказе</option>
                                <option value="ready_for_pickup" ${pr.status === 'ready_for_pickup' ? 'selected' : ''}>Готова к получению</option>
                                <option value="received" ${pr.status === 'received' ? 'selected' : ''}>Получено</option>
                            </select>
                        </div>
                        <div class="form-group" id="pickupAddressGroup" style="display: ${pr.status === 'ready_for_pickup' ? 'block' : 'none'}">
                            <label>Адрес получения</label>
                            <input type="text" id="pickupAddress" placeholder="Введите адрес получения" value="${pr.pickup_address || ''}">
                        </div>
                        <button class="btn" onclick="updatePRStatus('${pr.id}')">Сохранить статус</button>
                    </div>
                    <div class="actions">
                        <button class="btn btn-success" onclick="approvePR('${pr.id}')">Одобрить</button>
                        <button class="btn btn-danger" onclick="rejectPR('${pr.id}')">Отклонить</button>
                    </div>
                `;
            }

            if (canEdit) {
                html += `<button class="btn btn-warning" onclick="editPR('${pr.id}')">Редактировать и отправить на рассмотрение</button>`;
            }

            document.getElementById('content').innerHTML = html;
        }

        window.handleEditMaterialSelect = function(itemNum) {
            const select = document.getElementById('editItem' + itemNum + 'Material');
            const nameInput = document.getElementById('editItem' + itemNum + 'Name');
            const unitSelect = document.getElementById('editItem' + itemNum + 'Unit');
            if (select && select.selectedOptions[0]) {
                const option = select.selectedOptions[0];
                if (nameInput && !nameInput.value) nameInput.value = option.getAttribute('data-name');
                if (unitSelect && option.getAttribute('data-unit')) unitSelect.value = option.getAttribute('data-unit');

        window.saveEditedPR = async function(prId) {
            const items = [];
            let i = 1;
            while (document.getElementById('editItem' + i + 'Name')) {
                const name = document.getElementById('editItem' + i + 'Name').value;
                if (name) items.push({ name, quantity: parseFloat(document.getElementById('editItem' + i + 'Qty').value) || 1, unit: document.getElementById('editItem' + i + 'Unit').value, note: document.getElementById('editItem' + i + 'Note').value });
                i++;
            }
            if (items.length === 0) { showToast('Добавьте хотя бы одну позицию'); return; }
            try {
                await supabase.from('purchase_request_items').delete().eq('purchase_request_id', prId);
                await supabase.from('purchase_request_items').insert(items.map(item => ({ purchase_request_id: prId, ...item })));
                await supabase.from('purchase_requests').update({ status: 'pending', comment: null, updated_at: new Date().toISOString() }).eq('id', prId);

        window.createPR = async function() {
            const items = [];
            let i = 1;
            
            while (document.getElementById('prItem' + i + 'Name')) {
                const name = document.getElementById('prItem' + i + 'Name').value;
                if (name) {
                    items.push({
                        name,
                        quantity: parseFloat(document.getElementById('prItem' + i + 'Qty').value) || 1,
                        unit: document.getElementById('prItem' + i + 'Unit').value,
                        note: document.getElementById('prItem' + i + 'Note').value
                    });
                }
                i++;
            }
            
            if (items.length === 0) {
                showToast('Добавьте хотя бы одну позицию');
                return;
            }
            
            try {
                // Create the PR
                const prData = {
                    status: 'pending',
                    created_by: currentUserProfile?.id
                };
                
                if (prType === 'task' && prRefId) {
                    prData.task_id = prRefId;
                } else if (prType === 'installation' && prRefId) {
                    prData.installation_id = prRefId;
                }
                
                const { data: pr, error: prError } = await supabase
                    .from('purchase_requests')
                    .insert([prData])
                    .select()
                    .single();
                
                if (prError) throw prError;
                
                // Add items
                const itemsWithPRId = items.map(item => ({
                    purchase_request_id: pr.id,
                    ...item
                }));
                
                const { error: itemsError } = await supabase
                    .from('purchase_request_items')
                    .insert(itemsWithPRId);
                
                if (itemsError) throw itemsError;
                
                closeModal();
                showToast('Заявка создана');
                
                // Refresh the current view
                if (currentView === 'purchaseRequests') {
                    renderPurchaseRequests(document.getElementById('content'));
                } else if (currentView === 'tasks' && prType === 'task') {
                    showTaskDetail(prRefId);
                } else if (currentView === 'installations' && prType === 'installation') {
                    showInstallationDetail(prRefId);
                }
            } catch (error) {
                showToast('Ошибка: ' + error.message);
            }
        };

        // ============================================================
        // CALENDAR
        // ============================================================
        async function renderCalendar(content) {
            const year = calendarDate.getFullYear();
            const month = calendarDate.getMonth();
            
            const monthNames = ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь', 
                              'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'];
            
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const startDay = firstDay.getDay() || 7;
            const totalDays = lastDay.getDate();
            
            // Get tasks and installations for this month
            const startDate = new Date(year, month, 1).toISOString();
            const endDate = new Date(year, month + 1, 0).toISOString();
            
            const [tasks, installations] = await Promise.all([
                supabase.from('tasks').select('id, title, status, due_date').gte('due_date', startDate).lte('due_date', endDate),
                supabase.from('installations').select('id, title, status, scheduled_at').gte('scheduled_at', startDate).lte('scheduled_at', endDate)
            ]);
            
            let html = `
                <h2 style="margin-bottom: 16px">Календарь</h2>
                <div class="calendar">
                    <div class="calendar-header">
                        <button class="calendar-nav" onclick="changeMonth(-1)">◀</button>
                        <div class="calendar-month">${monthNames[month]} ${year}</div>
                        <button class="calendar-nav" onclick="changeMonth(1)">▶</button>
                    </div>
                    <div class="calendar-weekdays">
                        <div class="calendar-weekday">Пн</div>
                        <div class="calendar-weekday">Вт</div>
                        <div class="calendar-weekday">Ср</div>
                        <div class="calendar-weekday">Чт</div>
                        <div class="calendar-weekday">Пт</div>
                        <div class="calendar-weekday">Сб</div>
                        <div class="calendar-weekday">Вс</div>
                    </div>
                    <div class="calendar-days">
            `;
            
            // Previous month days
            const prevMonthDays = new Date(year, month, 0).getDate();
            for (let i = startDay - 1; i > 0; i--) {
                html += `<div class="calendar-day other-month">${prevMonthDays - i + 1}</div>`;
            }
            
            // Current month days
            const today = new Date();
            for (let day = 1; day <= totalDays; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const isToday = today.getDate() === day && today.getMonth() === month && today.getFullYear() === year;
                
                // Check for items on this day
                const dayTasks = tasks.data?.filter(t => t.due_date && t.due_date.startsWith(dateStr)) || [];
                const dayInstallations = installations.data?.filter(i => i.scheduled_at && i.scheduled_at.startsWith(dateStr)) || [];
                const hasItems = dayTasks.length > 0 || dayInstallations.length > 0;
                
                html += `
                    <div class="calendar-day ${isToday ? 'today' : ''} ${hasItems ? 'has-items' : ''}" onclick="showCalendarDay('${dateStr}')">
                        ${day}
                        ${hasItems ? `<div class="calendar-day-items">${dayTasks.length + dayInstallations.length}</div>` : ''}
                    </div>
                `;
            }
            
            // Next month days
            const remainingDays = 42 - (startDay - 1 + totalDays);
            for (let day = 1; day <= remainingDays; day++) {
                html += `<div class="calendar-day other-month">${day}</div>`;
            }
            
            html += `
                    </div>
                </div>
            `;
            
            content.innerHTML = html;
        }
        
        window.changeMonth = function(delta) {
            calendarDate.setMonth(calendarDate.getMonth() + delta);
            renderContent();
        };
        
        window.showCalendarDay = async function(dateStr) {
            const [tasks, installations] = await Promise.all([
                supabase.from('tasks').select('*').like('due_date', dateStr + '%'),
                supabase.from('installations').select('*').like('scheduled_at', dateStr + '%')
            ]);
            
            let html = `
                <button class="btn btn-outline btn-sm" onclick="navigate('calendar')" style="margin-bottom: 16px">← Назад к календарю</button>
                <h2 style="margin-bottom: 16px">${new Date(dateStr).toLocaleDateString('ru-RU')}</h2>
            `;
            
            if (tasks.data && tasks.data.length > 0) {
                html += `<h3 class="section-title">Задачи</h3>`;
                tasks.data.forEach(task => {
                    html += `
                        <div class="calendar-item" onclick="showTaskDetail('${task.id}')">
                            <div class="list-item-title">${task.title}</div>
                            <span class="status status-${task.status}">${getStatusLabel(task.status)}</span>
                        </div>
                    `;
                });
            }
            
            if (installations.data && installations.data.length > 0) {
                html += `<h3 class="section-title">Монтажи</h3>`;
                installations.data.forEach(inst => {
                    html += `
                        <div class="calendar-item installation" onclick="showInstallationDetail('${inst.id}')">
                            <div class="list-item-title">${inst.title}</div>
                            <div class="calendar-item-time">${inst.scheduled_at ? new Date(inst.scheduled_at).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' }) : ''}</div>
                        </div>
                    `;
                });
            }
            
            if ((!tasks.data || tasks.data.length === 0) && (!installations.data || installations.data.length === 0)) {
                html += '<div class="empty-state"><p>Нет запланированных задач</p></div>';
            }
            
            document.getElementById('content').innerHTML = html;
        };
